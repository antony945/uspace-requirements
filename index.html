    "quote": "The definition of ‘dangerous goods’ in Article 2(11) of the UAS Regulation stems from the definition and classification of ‘dangerous goods’ in the ICAO Technical Instructions. ICAO  Advisory  Circular (AC) 102-37, Revision 0, issued on 23 June 2020, contains further information.\n\nUnder the definition of ‘dangerous goods’ in Article 2(11),  blood  is  considered  capable  of  posing  a hazard to health when it contains or may contain infectious substances.\n\n‘Infectious substances’ means substances that are classified under Division 6.2 of the Technical Instructions. The definition and classification of such substances are also available in the above-mentioned ICAO AC 102-37.\n\nBlood  for  transfusion  and  medical  samples  that  are  not  subject  to  the  provisions  of  the  Technical Instructions may be transported in the ‘open’, ‘specific’, or ‘certified’ categories.\n\nBlood  that  contains  or  potentially  contains  infectious  substances  should  be  transported  in  the ‘specific’ or ‘certified’ categories. If such transport results in a high risk for third parties in case of an accident, the UAS operation falls under the ‘certified’ category (as per  Article 6(1)(b)(iii) of the UAS Regulation). If the blood contains or potentially contains infectious substances and is enclosed in such a container such that the blood will not be spilled in case of an accident, the UAS operation may fall under the ‘specific’ category if there are no other causes of high risk for third parties.\n\nArticles and substances which would otherwise be classified as dangerous goods (e.g. fuel, batteries and other goods used during the flight to supply energy to the drone’s system) but which are required to  be  on  board  the  aircraft  for  the  propulsion  of  the  UAS  or  for  the  operation  of  its  specialised equipment  during  transport,  or  which  are  required  in  accordance  with  the  pertinent  operating requirements  should  not  be  considered  as  transported  dangerous  goods  and  their  safety  should verified during the design verification of the UAS.",

    "quote": "A  UAS  is  considered  privately  built  when  it  is manufactured or  assembled  by the operator  for  their own use and not placed on the market (i.e. there is no offer or agreement (written or verbal) for the transfer  of  its  ownership  or  any  other  property  right).  In  the  context  of  this  definition,  the  terms ‘assembled’ or ‘manufactured’ by the operator concerns one of the following actions:\n\n(a) the complete manufacturing of the UAS, or at least the most of it;\n\n(b) the assembly of the UAS from parts or sub-assemblies sold separately;\n\n(c) the modification of a class C4 UAS (aeromodel).\n\nA change of one or a few components of a UAS bearing a class identification label (apart from a C4 UAS) does not qualify it as a privately built UAS, unless the change is described in the manufacturer’s instructions. For more information, please refer to AMC1 UAS.OPEN.020(5)(c) and (d), UAS.OPEN.030(3) and UAS.OPEN.040(4)(c), (d) and (e).\n\nA UAS assembled from the elements provided in a ‘ready-to-assemble kit’ is also not considered ‘privately built’.",

    "reviewed": true,
    "note": "Reminder, flying over assemblies of people is always not allowed in the 'open' category.",
    "quote": "Due to the huge variety of possible circumstances, this GM only provides general guidelines.\n\nAn  uninvolved  person  is  a  person  that  does  not  take  part  in  the  UAS  operation,  either  directly  or indirectly, and that could be potentially affected by the UAS operation. Persons protected by a shelter (e.g. a roof) are not considered to be affected by the UAS operation nor exposed to direct risks if the MTOM of the UA is below 25 kg or if the UA complies with the conditions defined in criterion #2 of mitigation M1 of the SORA (refer to point B.2 of Annex B to the SORA).\n\nPeople that sit at a beach or in a park, or walk on a street or on a road, are also generally considered uninvolved persons.\n\nA person may be considered to be ‘involved’ in the UAS operation when the following conditions are met.\n\nBefore the flight, the person:\n\n(a) has given explicit consent (it may be verbal) to the UAS operator or to the remote pilot to be part of the UAS operation (even indirectly as a spectator or just accepting to be overflown by the UAS); and\n\n(b) has  received  from  the  UAS  operator  or  from  the  remote  pilot  clear  instructions  and  safety precautions to follow in case the UAS exhibits any unplanned behaviour.\n\nUAS  operators  are  responsible  for  ensuring  that  all  persons  involved  are  able  to  follow  in  a  timely manner the emergency procedures.\n\nIn principle, in order to be considered a ‘person involved’, one:\n\n(a) is able to decide whether or not to participate in the UAS operation;\n\n(b) broadly understands the risks involved;\n\n(c) has reasonable safeguards during the UAS operations, introduced by the site manager and the aircraft operator; and\n\n(d) is not restricted from taking part in the event or activity if they decide not to participate in the UAS operation.\n\nThe person involved is expected to follow the directions and safety precautions provided by the UAS operator or the remote pilot, and the UAS operator or the remote pilot should check by asking simple questions to make sure that the directions and safety precautions have been properly understood.\n\nIt  should  be  reminded  that  UAS operations over  assemblies  of  people (e.g.  sport  activities  or other mass public events) are never allowed in the ‘open’ category. These operations may be classified as falling into the ‘specific’ or ‘certified’ category, depending on the risk involved. Spectators or any other people gathered for sport activities or other mass public events for which the UAS operation is not the primary focus are generally considered ‘uninvolved persons’.\n\nAn example: when filming with a UAS at  a large music festival or public event, it  is not sufficient  to inform the audience or anyone present via a public address system, or via a statement on the ticket, or  in  advance  by  email  or text message. Those  types  of  communication  channels  do  not  satisfy the points  above.  In  order  to  be  considered  a  person  involved,  each  person  should  be  asked  for  their permission and be made aware of the possible risk(s).",

    "quote": "The employment of AOs is not limited to operations covered by STSs — they can be employed also in other operations under the ‘specific’ category. The AO’s main responsibilities, as defined in point UAS.STS-02.050, are to:\n\n(1) maintain a thorough visual scan of the airspace surrounding the unmanned aircraft (UA) in order to identify any risk of collision with any manned aircraft;\n\n(2) maintain  awareness  of  the  position  of  the  UA  through  visual  contact  or  through  assistance provided by electronic means;\n\n(3) alert  the  remote  pilot  when  a  hazard  is  detected  and  assist  in  avoiding  or  minimising  the potential negative effects.",

    "note": null,
    "quote": "The ‘flight  geography’ is the spatially and temporally defined volume of airspace in which the UAS operator plans to conduct the operation under normal procedures; the projection of such volume on the surface of the Earth constitutes the ‘flight geography area’. Additionally, the UA positioning errors must be accounted for in the definition of this area.\n\nTo cope with abnormal situations (e.g. navigation errors, UA drifting due to wind/gusts, etc.), the UAS operator  should  define  the  ‘contingency volume’  as  an  airspace  volume  where  contingency procedures are applied in order to bring the UA back to a normal situation within the ‘flight geography’ (for  example,  if  the  UA  exits  the  boundaries  of  the  flight  geography,  the  remote  pilot  should  take actions to pilot the UAS back into the flight geography. If the contingency situation persists, the remote pilot  should  activate  the  FTS  (if  available)  before  the  UAS  exits  the  contingency  volume).  The projection of the contingency volume on the surface of the Earth is the ‘contingency area’.\n\nThe ‘operational volume’ includes the ‘flight geography’ and the ‘contingency volume’. To define the operational volume, the UAS operator should consider the position-keeping capabilities of the UAS in a 4D space (latitude, longitude, height, and time).\n\nThe  accuracy  of  the  navigation  solution,  the  flight  technical  error  of  the  UAS,  as  well  as  the  path definition  error  (e.g.  map  error)  and  latencies  should  be  considered  and  addressed  in  defining  the operational volume. For navigation errors: the UAS operator should take into account that such errors are determined by the interaction of several contributes, like positioning sensors providing position, navigation and flight control systems, system and human latencies, and environment.\n\nThe UAS operator should, therefore, establish sufficient margins to cater for such errors.\n\nThe ‘ground risk buffer’ is the area on the surface of the Earth surrounding the operational volume, which is defined by the UAS operator to minimise the risk to third parties on the surface in case the UA  leaves  the  operational  volume  (i.e.  the  area  the  UA  is  expected  to  impact  if  its  FTS  is  triggered when the UA leaves the operational volume). Point 2.3.1(c)(3) of AMC1 to Article 11 (SORA) provides additional information.",

    "quote": "(a) Boundary between ‘open’ and ‘specific’ - A UAS operation does not belong to the ‘open’ category when at least one of the general criteria listed in Article 4 of the UAS Regulation is not met (e.g. when operating beyond visual  line of sight (BVLOS)) or when the detailed criteria for a subcategory are not met (e.g. operating a 10 kg UA close to people when subcategory A2 is limited to 4 kg UA).\n\n(b) Boundary between ‘specific’ and ‘certified’ - Article 6 of the UAS Regulation and Article 40 of Regulation (EU) 2019/945 define the boundary between the ‘specific’ and the ‘certified’ category. The first article defines the boundary from an  operational  perspective,  while  the  second  one  defines  the  technical  characteristics  of  the UA, and they should be read together.\n\nA UAS operation belongs to the ‘certified’ category when, based on the risk assessment, the competent authority considers that the risk cannot be mitigated adequately without the:\n\n—  certification of the airworthiness of the UAS;\n\n—  certification of the UAS operator; and\n\n—  licensing of the remote pilot, unless the UAS is fully autonomous.\n\nUAS operations are always considered to be in the ‘certified’ category when they:\n\n—  are conducted  over assemblies  of people with a UA that has characteristic dimensions of 3 m or more; or\n\n—  involve the transport of people; or \n\n—  involve  the  carriage  of  dangerous  goods  that  may  result  in  a  high  risk  for  third parties in the event of an accident.",

    "quote": "(a) Dangerous goods may be transported in the ‘specific’ category of UAS operations only if the UAS operator is able to demonstrate that these goods will not cause harm or damage to third parties  or  to  the  environment  in  case  of  accident.  When  compatible  with  the  operation,  a crash-protected  container,  which  will  prevent  the  leakage/dispersion  of  dangerous  goods  in case of accident, would be acceptable. In this case, the UAS operator should demonstrate that the  container  is  capable  of  maintaining/protecting  the  dangerous  goods  without  causing damage or harm to third parties or the environment in case of accident. In demonstrating the conformity of the container, the operational characteristics of the flight (flight speed, altitude, weather  conditions,  etc.)  shall  be  taken  into  account,  as  well  as  the  defining  aspects  of  the geographical area of operation.\n\n(b) The  assessment  of  the  operational  risk  of  transporting  dangerous  goods  should  take  into account the following:\n\n  (1) the risk that such goods pose to persons that  are directly involved in their handling, to the environment, and to third parties and their properties;\n  \n  (2) the hazard posed by the quantity and class of the dangerous goods;\n  \n  (3) the characteristics of the container for the dangerous goods;\n  \n  (4) the level of competence of those handling the dangerous goods; and\n  \n  (5) the geographical area in which the flight will be operated.\n  \n(c) The  UAS  operator that wishes to carry out operations in the ‘specific’ category to transport dangerous goods should establish a dangerous goods training programmes for the personnel involved,  as  required  by  the  Technical  Instructions.  Such  training  programmes  should  be commensurate  with  the  responsibilities  of  the  personnel  involved  in  those  operations.  The training programmes should be subject to review and approval by the competent authority, and should cover at least the following aspects:\n\n  (1) dangerous goods terminology;\n  \n  (2) classification of dangerous goods;\n  \n  (3) labelling of dangerous goods;\n  \n  (4) identification of dangerous goods that use ‘SDSs’ and the Globally Harmonised System of Classification and Labelling of Chemicals (GHS) consumer labelling;\n  \n  (5) use of the dangerous goods list provided in the Technical Instructions;\n  \n  (6) storage and handling of dangerous goods, including but not limited to the segregation of incompatible dangerous goods, dangerous goods loading, and dangerous goods securing;\n  \n  (7) instructions and safety precautions to be provided to employees and third parties; and\n  \n  (8) emergency/reporting procedures included in the ERP in case of an accident/incident with dangerous goods.",

    "note": null,
    "quote": "The operational risk assessment required by Article 11 of the UAS Regulation may be conducted using the methodology described in AMC1 Article 11. This methodology is basically the specific operations risk assessment (SORA) developed by JARUS. Other methodologies might be used by the UAS operator as alternative means of compliance.\n\nUnmanned free balloons are unmanned aircraft and shall thus comply with Regulation (EU) 2019/947. For this type of aircraft, compliance with Appendix 2 to Regulation (EU) No 923/2012 is considered an acceptable means of compliance with Article 11.\n\nAspects  other  than  safety,  such  as  security,  privacy,  environmental  protection,  the  use  of  the  radio  frequency  (RF)  spectrum,  etc.,  should  be  assessed  in accordance with the applicable requirements established by the Member State in which the operation is intended to take place, or by other EU regulations.\n\nFor some UAS operations that are classified as being in the ‘specific’ category, alternatives to carrying out a full risk assessment are offered to UAS operators:\n\n(a) for UAS operations with lower intrinsic risks, a declaration may be submitted when the operations comply with the standard scenarios (STSs) listed in Appendix 1 to the UAS Regulation. Table 1 provides a summary of the STSs; and\n\n(b) for  other  UAS  operations,  a  request  for  authorisation  may  be  submitted  based  on  the  mitigations  and  provisions  described  in  the  predefined  risk assessment (PDRA) when the UAS operation meets the operational characterisation described in AMC2 et seq. Article 11 to the UAS Regulation. Table 2 below provides a summary of the PDRAs that have been published so far.\n\nWhile the STSs are described in a detailed way, the provisions and mitigations in the PDRAs are described in a rather generic way to provide flexibility to UAS operators  and  the  competent  authorities  to  establish  more  prescriptive  limitations  and  provisions  that  are  adapted  to  the  particularities  of  the  intended operations. Two types of PDRAs are provided:\n\n— those  derived  from  an  STS,  which  allow  the  UAS  operator  to  conduct  similar  operations,  but  using,  for  example,  UAS  without  the  class  label  that  is mandated by the STS (e.g. privately built UAS); and\n\n— more generic PDRAs.\n\nThe codification of a PDRA includes the letter ‘G’ or ‘S’ (e.g. PDRA-G01 or PDRA-S01): \n\n— ‘G’ is used for generic PDRAs. \n\n— ‘S’ is used for PDRAs that are derived from an STS whose level of prescriptiveness is the same as of the corresponding STS. Therefore, those PDRAs, although they address UAS operations that are subject to operational authorisations (to allow the use of UAS without a class  label), are expected to provide  an even more simplified authorisation process compared to other (non-STS-related) PDRAs. Ideally, for UAS operations that are performed based on those PDRAs, the competent authorities may implement expedited operational-authorisation processes. Those processes may be based on the review of the documentation that is submitted by the UAS operator to support the declaration of compliance with the PDRA provisions.\n\nIn accordance with Article 11 of the UAS Regulation, the applicant must collect and provide the relevant technical, operational and system information needed to assess the risk associated with the intended operation of the UAS, and the SORA (AMC1 Article 11 of the UAS Regulation) provides a detailed framework for such data collection and presentation. The concept of operations (ConOps) description is the foundation for all other activities, and should be as accurate and detailed as possible. The ConOps should not only describe the operation, but also provide insight into the UAS operator’s operational safety culture. It should also include how and when to interact with the air navigation service provider (ANSP) when applicable.\n\nPDRAs only  address  safety  risks; consequently,  additional  limitations  and  provisions might  need  to  be  included  after  the  consideration of other  risks  (e.g. security, privacy, etc.).\n\n| STS# | Edition/date | UAS characteristics | BVLOS/VLOS | Overflown area | Maximum range from remote pilot | Maximum height | Airspace | Notes |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| STS-01 | June 2020 | Bearing a C5 class marking (maximum characteristic dimension of up to 3 m and MTOM of up to 25 kg) | VLOS | Controlled ground area that might be located in a populated area | VLOS | 120 m | Controlled or uncontrolled, with low risk of encounter with manned aircraft | |\n| STS-02 | June 2020 | Bearing a C6 class marking (maximum characteristic dimension of up to 3 m and MTOM of up to 25 kg) | BVLOS | Controlled ground area that is entirely located in a sparsely populated area | 2 km with an AO 1 km, if no AO | 120 m | Controlled or uncontrolled, with low risk of encounter with manned aircraft | |\n\nWhen UAS operators intend to conduct an operation covered by a PDRA, they should fill in the last two columns of the table related to the selected PDRA, named ‘integrity’ and ‘proof’. In the column ‘integrity’ they should explain how the level of integrity is met, and in the column ‘proof’ how the level of integrity is demonstrated. To support UAS operators, the two columns are already prefilled; however, the UAS operator may adapt the text to their needs.\n\nIf the UAS operation does not fit completely within the limits of the PDRA, the UAS operator is required to conduct a full risk assessment and submit it to the competent authority. Changes to the PDRA should not be done, unless the competent authority accepts that minor changes should be made.\n\n| PDRA# | Edition/date | UAS characteristics | BVLOS/VLOS | Overflown area | Maximum range from remote pilot | Maximum height | Airspace | AMC# to Article 11 | Notes |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| PDRA-S01 | 1.1 / January 2022 | Maximum characteristic dimension of up to 3 m and take-off mass of up to 25 kg | VLOS | Controlled ground area that might be located in a populated area | VLOS | 150 m | Controlled or uncontrolled, with low risk of encounter with manned aircraft | AMC4 | |\n| PDRA-S02 | 1.1 / January 2022 | Maximum characteristic dimension of up to 3 m and take-off mass of up to 25 kg | BVLOS | Controlled ground area that is entirely located in a sparsely populated area | 2 km with an AO or with AOs 1 km, if no AO | 150 m | Controlled or uncontrolled, with low risk of encounter with manned aircraft | AMC5 | |\n| PDRA-G01 | 1.2 / January 2022 | Maximum characteristic dimension of up to 3 m and typical kinetic energy of up to 34 kJ | BVLOS | Sparsely populated area | If no AO, up to 1 km | 150 m (operational volume) | Uncontrolled, with low risk of encounter with manned aircraft | AMC2 | |\n| PDRA-G02 | 1.1 / January 2022 | Maximum characteristic dimension of up to 3 m and typical kinetic energy of up to 34 kJ | BVLOS | Sparsely populated area | n/a (direct C2 link) | As established for the reserved or segregated airspace | Reserved or segregated airspace for the UAS operation | AMC3 | |\n| PDRA-G03 | 1.0 / January 2022 | Maximum characteristic dimension of up to 3 m and typical kinetic energy of up to 34 kJ | BVLOS | Sparsely populated areas | n/a (direct C2 link) | 50 m from ground unless in reserved or segregated airspace | Controlled or uncontrolled airspace if height is below 50 m, otherwise reserved or segregated airspace | AMC6 | |\n\nFor the purposes of the SORA, the following definitions should apply:\n\n— ‘populated area’ should be understood as ‘congested area’, as defined in Regulation (EU) No 965/2012 (the ‘Air Operations Regulation’): ‘in relation to a city, town or settlement, any area which is substantially used for residential, commercial or recreational purposes’; and\n\n— ‘rural area’ is used in the context of the air risk and it means the volume outside a populated area and not within the aerodrome traffic zone (ATZ) of an aerodrome.",

    "quote": "The competent authority shall grant an operational authorisation when:\n\n(a) the evaluation performed pursuant to paragraph 1 concludes that:\n\n  (i) the operational safety objectives take account of the risks of the operation;\n  \n  (ii) the combination of mitigation measures concerning the operational conditions to perform  the  operations,  the  competence  of  the  personnel  involved  and  the technical features of the unmanned aircraft, are adequate and sufficiently robust to keep the operation safe in view of the identified ground and air risks;\n\n(b) for  UAS  that  are  or  will  be  certified  pursuant  to  Article  40,  point  1(d)  of  Delegated Regulation (EU) 2019/945, the UAS have:\n\n  (i) a valid certificate of airworthiness or a restricted certificate of airworthiness and, if  the  UA  is  subject  to  the  environmental  protection  requirements  laid  down  in point 21.B.85 of Regulation (EU) No 748/2012, a valid noise certificate; or\n  \n  (ii) if  the UA does not  meet, or has not been shown to meet, the applicable airworthiness requirements, flight conditions approved according to Subpart P of Annex I (Part 21) to Regulation (EU) No 748/2012;\n  \n(c) the UAS operator has provided to the competent authority a statement confirming that the intended operation complies with any applicable Union and national rules relating to it, in particular with regard to privacy, data protection, liability, insurance, security and environmental protection.",

    "quote": "The operational authorisation granted by the competent authority shall detail:\n\n(a) the scope of the authorisation;\n\n(b) the ‘specific’ conditions that shall apply:\n\n  i. to the UAS operation and the operational limitations;\n  \n  ii. to  the  required  competency  of  the  UAS  operator  and,  where  applicable,  of  the remote pilots;\n  \n  iii. to  the  technical  features  of  the  UAS,  including  the  certification  of  the  UAS,  if applicable;\n\n(c) the following information:\n\n  i. the registration number of the UAS operator and the technical features of the UAS;\n  \n  ii. a reference to the operational risk assessment developed by the UAS operator;\n  \n  iii. the operational limitations and conditions of the operation;\n  \n  iv. the mitigation measures that the UAS operator has to apply;\n  \n  v. the  location(s)  where  the  operation  is  authorised  to  take  place  and  any  other locations in a Member States in accordance with Article 13;\n  \n  vi. all documents and records relevant for the type of operation and the type of events that  should  be  reported  in  addition  to  those  defined  in  Regulation  (EU)  No 376/2014 of the European Parliament and of the Council\n  \n  vii. the certificate of airworthiness or restricted certificate of airworthiness and noise certificate, where such certificates have been issued;\n  \n  viii. the  flight  conditions  approved  in  accordance  with  Regulation  (EU)  No  748/2012 where the UAS meets the conditions set out in Article 40, point 1(d) of Delegated Regulation  (EU) 2019/945 and  the UA  does  not meet,  or  has  not  been  shown to meet, the applicable airworthiness requirements.",

    "note": "Rules for flying in different Member State from the one you took the registration in, in specific or certified category.",
    "quote": "(a) A UAS operator that intends to conduct an operation, for which an operational authorisation is required, partially or fully in a Member State other than the State of registration, it should firstly obtain any required authorisation for that operation from the State of registration, unless the UAS operator has a LUC with the appropriate privileges. This process applies also when the UAS operator intends to conduct an operation only in a MS other than the State of registration.\n\n(b) The UAS operator should:\n\n  (1) identify the applicable local conditions in the area of operation;\n  \n  (2) adapt the operational procedures, as necessary:\n  \n    (i) to comply with the applicable local conditions; and\n    \n    (ii) as required by the application to the new location(s) of the mitigation measures, identified in the operational authorisation;\n    \n  (3) submit to the competent authority of the MS of operation (refer to https://www.easa.europa.eu/domains/civil-drones/naa for the links to the NAA websites) an application for a cross-border operation using the form provided in AMC1 Article 13(1), attaching the following:\n  \n    (i) a copy of the operational authorisation issued by the competent authority of the MS  of  registration,  or  a  copy  of  the  LUC  terms  of  reference  if  the  operation  is conducted under the privileges of the LUC;\n    \n    (ii) those chapter(s)/section(s) of the operations manual (OM) providing the operational  procedures  and  the  relevant  information,  amended  as  necessary,  to comply  with  the  local  conditions  and  apply  the  mitigation  measures  to  the  new intended  location(s),  unless  the  UAS  operator  holds  a  LUC  with  the  appropriate privileges; and\n    \n    (iii) evidence of compliance of the amended procedures (refer to point ii) according to the level of robustness of the mitigation measures, if any, unless the UAS operator has a LUC with the appropriate privileges.\n    \n  (c) The  competent  authority  of  the  MS  of  operation  should,  without  undue  delay,  evaluate  the information provided by the UAS operator and verify the application of local condition(s) and of the updated mitigation measures applicable to the intended location(s) of the operation.\n  \n  (d) Once  the  competent  authority  of  the  MS  of  operation  is  satisfied,  it  should  provide  the competent authority of the MS of registration and the UAS operator with the confirmation of acceptability (refer to the template provided in AMC1 Article 13(2)) that the updated mitigation measures and procedures are satisfactory for the intended location(s).\n\n  (e) After receiving the confirmation of acceptability, the UAS operator may start its operation.\n  \n  (f) The  competent  authority  of  the  MS  of  registration  should  issue  a  revision  of  the  operational authorisation listing the additional new location(s), and provide a copy of the revised operational authorisation to the MS of authorisation and to the UAS operator.\n  \n  (g) A UAS operator that holds a LUC with the appropriate privileges listed in its terms of reference may operate without following the above procedures. However, the UAS operator:\n  \n    (1) must  provide  to  the  MS  of  operation  the  application  using  the  form  provided  in AMC1 Article 13(1), attaching the following:\n    \n      (i) a copy of the terms of approval received in accordance with point UAS.LUC.050 of the Annex to the UAS Regulation; and\n      \n      (ii) the  location(s)  of  the  intended  operation  in  accordance  with  paragraph  1(b)  of Article 13(1) of the UAS Regulation.\n      \n    (2) If the LUC terms of reference include the privileges to assess the local conditions and to apply  the mitigation measures  in other locations, than the UAS operator may start  the operation  as  soon  as  it  has  received  confirmation  of  receipt  and  completeness  of  the application.\n    \n    (3) If the LUC terms of reference do not include the privileges to assess the local conditions and/or apply the mitigation measures in other locations, than the UAS operator may start the  operation  only  after  it  has  received  the  confirmation  of  acceptability  (refer  to  the template  provided  in  AMC1 Article 13(2))  that  the  updated  mitigation  measures  and procedures are satisfactory for the intended location(s).",

    "quote": "The  picture  below  illustrates  an  example  of  an  authorisation,  already  provided  by  the  competent authority, to conduct an operation in the Member State of registration, which is used to conduct the same operation in another Member State.\n\nIn  the  example,  the  UAS  operator  receives  the  authorisation  from  the  competent  authority  of  the Member State of registration where the mitigation measures are listed, and they may be adapted to the  characteristics  of  the  area  of  operation  (e.g.  the  ground  risk  may  be  mitigated  by  flying  over  a river).\n\nWhen the UAS operator intends to conduct the same operation in another Member State, a copy of the authorisation issued by the competent authority of the Member State of registration needs to be sent to the NAA of the Member State of the UAS operations. A number of elements of the mitigation measures may remain valid, such as the way the operator is organised, the competences of the pilot, or  the  characteristics  of  the  UAS,  for  example.  Other  elements  instead  need  to  be  adapted  to  the geography of the area of operation (e.g. the operations cannot be conducted mostly over the river, or it is necessary to identify a flight path meeting the equivalent conditions in terms of the ground risk, the local airspace, terrain and climate). On these points and also on the airspace, terrain and climate, the  UAS  operators  are  expected  to  review  and  possibly  update  the  mitigation  means,  but  only  in relation to those elements.\n\nThe  competent  authority  of  the  Member  State  of  operation  is  not  expected  to  review  the  full  risk assessment, but  to limit its activity to checking and providing the  UAS operator and the competent authority of the Member State of registration with confirmation that the updated mitigation measures are satisfactory. Upon receipt of the confirmation, the UAS operator may start operating immediately, and the competent authority of registration will update the authorisation.\n\nThe picture  below  illustrates  an example of the case when an operation complying with one of the STSs listed in Appendix 1 to the UAS Regulation is conducted in a Member State other than the state of registration.\n\nThe UAS operator firstly submits the declaration to the competent authority of the Member State of registration,  which,  if  the  declaration  complies  with  the  UAS  Regulation,  issues  a  confirmation  of receipt  and  completeness.  The  UAS  operator  will  then  provide  the  competent  authority  of  the Member  State  of  operations  with  a  copy  of  the  declaration  and  the  confirmation  of  completeness received by the competent authority of the Member State of registration. There is no need for further verification.",

    "performance": false,

    "note": null,
    "quote": "(a) Although  military  and  State  aircraft  operations  are  in  principle  excluded  from  the  scope  of Regulation  (EU)  2018/1139  and  its  implementing  and  delegated  acts,  the  safety  of  such operations  is  paramount  when  conducted  in  airspace  that  is  subject  to  EU  aviation  safety regulations. In this context, the safe separation between military and State aircraft also in the U-space airspace is always expected during all stages of flight.\n\n(b) It  is  recalled  that  when  defining  UAS  geographical  zones  in  accordance  with  Article 15  of Regulation (EU) 2019/947, Member States should also consider other aspects than safety, such as security aspects. Indeed, a Member State could designate a U-space airspace in critical areas for security and/or defence reasons, including military and State aircraft operations.\n\n(c) In  this  context,  military  and  State  aircraft  authorities  are  partners  in  the  decision-making process of the coordination mechanism (as per Article 18(f) of Regulation (EU) 2021/664) for the designation of U-space to cover the safety and security aspects in a U-space airspace, from the initial ‘airspace risk assessment’ until the U-space is implemented and monitored.\n\n(d) The involvement of military authorities in relation to U-space is considered key to guaranteeing the  level  of  safety  and  security  in  the  U-space  airspace  from  both  a  ground  and  an  air  risk perspective.\n\n(e) For  example,  military  and  State  aircraft  that  conduct  short-notice  off-airfield  landings  while carrying out their  assigned operations may require portions of the U-space  to be  adjusted or possibly deactivated. In this case, air traffic control units should apply the dynamic reconfiguration of the U-space airspace at short notice, if/when required by military and State aircraft, as necessary, in accordance with the principles of Article 4 of Regulation (EU) 2021/664.",

    "quote": "At  this  stage  of  the  implementation,  the  U-space  is  not  foreseen  to  support  passenger  operations, which  are  today  carried  out  with  manned  VTOL-capable  aircraft  and  which  ultimately  could  be autonomously performed with e-VTOL UAS.\n\nIndeed, the U-space  system is intended to ensure  the  segregation of manned aircraft subject to air traffic  control or  the  remain-well-clear  spacing  of manned  aircraft  not  subject  to  air  traffic  control, including  manned  VTOL-capable  aircraft.  UAS operations  currently  foreseen  in urban  environments are  UAS  carrying  payload  or  goods,  but  not  humans.  Therefore,  today,  the  U-space  regulatory framework has been designed and relies on the overall assumption that drone-to-drone collisions will ultimately have limited consequences.",

    "note": null,
    "quote": "(a) The scope of Regulation (EU) 2021/664 is limited to unmanned aircraft, as well as to natural and \nlegal  persons  involved  in  their  operation;  in  the  context  of  this  Regulation:  UAS  operators, \nU-space service providers (USSPs), and common information services (CIS).\n\n(b) Therefore, the requirements on ATS providers or the requirements related to manned aircraft operations  are  not  included  in  this  Regulation.  Instead,  the  provisions  pertaining  to  ATS providers  are  included  in  a  dedicated  amendment  to  Regulation  (EU)  2017/373  through Regulation (EU) 2021/665. The provisions related to manned aircraft are included in a dedicated amendment  to  Regulation  (EU)  No 923/2012  (the  SERA  Regulation)  through  Regulation  (EU) 2021/666 on implementing acts as regards air operations as well as the use of airspace and the design of airspace structures respectively. \n\n(c) Regulation  (EU)  2021/664  does  not  apply  to  the  following  UAS  operations  for  the  following reasons: \n\n  (1) model aircraft operating in the framework of model aircraft clubs and associations that have received an authorisation in accordance with Article 16 of Regulation (EU) 2019/947 have demonstrated a good level of safety in clubs and associations, which allows to keep the seamless transition from the different national systems to the new Union regulatory framework provided for by Regulation (EU) 2019/947 is maintained; \n\n  (2) unmanned aircraft of a maximum take-off mass (MTOM) of less than 250 g when used in subcategory A1 of the ‘open’ category do not represent a significant safety risk in case of collision; this includes privately built unmanned aircraft of a MTOM of less than 250 g, as well  as  class C0  UAS  as  defined  in  Regulation  (EU)  2019/945,  including  those  that  are toys in the meaning of Directive 2009/48/EC; \n\n  (3) UAS  flying  according  to  instrument  flight  rules  (IFR)  in  accordance  with  the  current standardised European rules of the air (SERA); they benefit from the provision of air traffic service  (ATS),  as  summarised  in  Appendix 4  to  Regulation  (EU)  No 923/2012;  this  does not  exclude  certified  UAS  from  flying  in  U-space  airspace  with  the  support  of  U-space services; and \n\n(d) Finally, it is recalled that Regulation (EU) 2021/665 does not apply to UAS that carry out military, customs,  police,  search  and  rescue,  firefighting,  border  control  and  coastguard  or  similar activities  and  services  undertaken  in  the  public  interest,  by  virtue  of  the  scope  defined  in Article 2(3)(a) of Regulation (EU) 2018/1139.",

    "quote": "To  ensure  an  additional  strategic  layer  of  mitigation  as  regards  separation  between  manned  and unmanned  aircraft,  Member  States  may  consider  limiting  the  U-space  airspace  to  a  150 m  (500 ft) height above the ground or water, in particular  when the U-space airspace is designated in uncontrolled airspace.\n\nConsidering  the  novelty  of  the  U-space  and  the  lack  of  experience  with  its  implementation,  this limitation is deemed desirable to ensure safety of operations in the U-space airspace across the EU. \n\nIn this context, Member States may nevertheless decide to designate U-space airspace with a height greater than 150 m (500 ft) above the ground or water in controlled or uncontrolled airspace provided that there are additional services and means available to ensure a common reference altitude system between UAS and manned traffic, as well as additional U-space services and performance requirements for the services derived from the airspace risk assessment.",

    "note": null,
    "quote": "(a) Member States have complete and exclusive sovereignty over the airspace above their territory and, therefore, have full authority over the designation of the U-space airspace. \n\n(b) The designation of the U-space airspace is driven by safety, security, privacy or environmental considerations. \n\n(c) For the designation of the U-space airspace, Member States are expected to assess numerous safety-significant factors, including, among others: \n\n  (1) the type, density, and complexity of existing and planned unmanned traffic, including UAS operations taking place in the context of authorised model aircraft clubs and associations; \n\n  (2) the  type,  density,  and  complexity  of  existing  and  planned  manned  traffic,  including  air sports activities; \n\n  (3) the  operational  capacity  of  the  designated  ATS  providers  to  interface  with  the  CIS provider and USSPs in the designated U-space airspace; \n\n  (4) the operational capacity of USSPs and, when relevant, the single CIS provider; \n\n  (5) the complexity of the airspace structure; \n\n  (6) the availability of safe and secure communication mechanisms to enable UAS operators and USSPs to exchange digital information; \n\n  (7) the classification of the airspace and the services provided to instrument flight rule (IFR) and visual flight rule (VFR) aircraft; \n\n  (8) existing UAS geographical zones defined in accordance with Article 15 of Regulation (EU) 2019/947; and \n\n  (9) the topographical environment and prevalent meteorological conditions. \n\n(d) Conversely, when a Member State considers issuing a new authorisation to model aircraft clubs and  associations  or  when  defining  new  UAS  geographical  zones,  already  designated  U-space airspace should be considered. \n\n(e) Initial  designations  of  U-space  airspace  are  expected  to  take  place  at  low-level  altitude,  e.g. below 500 ft, and where there is very little expected manned traffic. \n\n(f) Besides  the  four  mandatory  U-space  services,  Member  States  may  decide  that  additional U-space  services  are  needed  to  support  the  safe,  secure,  and  efficient  conduct  of  UAS operations in specific volumes of U-space airspace.  \n\n(g) The regular reassessment of the U-space airspace is expected to be conducted by the Member States to evaluate its effectiveness in supporting the safe, secure, and efficient conduct of UAS operations.",
    "references": [
      "EU IR 2019/947 | Article 15"
    ],

    "note": null,
    "quote": "The U-space airspace may be designated for several reasons; for example: \n\n(a) Safety \n  \n  (1) Having the need to share a common volume of airspace between manned and unmanned aircraft; \n  \n  (2) To improve the visibility (e.g. by means of electronic conspicuity) of (un)manned aircraft, thus enabling a known traffic environment; \n  \n  (3) To  decrease  the  risk  on  ground  in  the  case  of  multiple  UAS  flying  over  an  assembly  of people in urban areas or over highly populated areas (in combination with other means such as the certification of unmanned aircraft, UAS operators, etc.); and \n  \n  (4) In the case of high UAS density, there could be a specific need to reduce the risk of UAS mid-air collision by organising the traffic through the introduction of certain UAS route structures. U-space services, such as geo-awareness, may provide support in that respect. \n\n(b) Economy \n  \n  (1) To  ensure  a  fair  and  efficient  sharing  of  the  airspace  volume  between  manned  and unmanned aircraft, and between manned aircraft; \n  \n  (2) To enable more complex and denser UAS operations; and \n  \n  (3) To support the development of the drone sector and the provision of associated services to the public. \n\n(c) Security \n  \n  (1) To  improve  the  visibility  of  unmanned  aircraft  by  having  most  of  the  airspace  users identified; \n  \n  (2) To support the enforcement of local regulations and rules (e.g. prohibition of flights over sensitive  sites,  limited  schedules,  specific  performance  requirements)  where  there  are too  frequent  violations,  if  the  availability  of  the  related  UAS  geographical  zones  is  not sufficient to ensure the effective application of flight constraints to support UAS operations. This may notably concern the protection of critical infrastructures and no-fly zones; \n  \n  (3) To support Member States’ authorities in identifying,  responding  to,  and  investigating the use of UAS for malicious or unlawful purposes; and \n  \n  (4) To  support  the  protection  of  services  that  are  critical  to  the  proper  functioning  of  the Member  States, the  economies  and  the  societies  from  the  use  of  UAS  for  malicious or unlawful purposes. \n\n(d) Privacy \n  \n  To support the enforcement of particular conditions for certain or all UAS operations for privacy reasons. Flying over some specific areas could be restricted to some users or to some slots (as it is the case for restricted areas for manned aviation). \n\n(e) Environment \n  \n  (1) To  define  environmental  requirements  for  UAS  operations  (noise  could  be  limited,  a minimum height could be required); \n  \n  (2) To  distribute  traffic density to an acceptable level of disturbance  over environmentally sensitive sites; \n  \n  (3) Enabling  a  diverse  set  of  UAS  operations  (e.g.  commercial  and  residential  areas  etc.), while respecting environmentally protected areas. \n  \n  (4) To minimise CO2 emissions, especially in urban environments.",

    "quote": "Considering  Annex  I  to  Regulation  (EU)  2021/664,  Member  States  should  establish  and  provide  the U-space airspace definition, encompassing: \n  \n(a) the geographical limits of the area where the U-space airspace is designated; \n  \n(b) the  internal  airspace  structure  (e.g.  airspace  blocks  with  their  maximum  and  minimum  size, subject to activation/deactivation); \n  \n(c) the UAS geographical zones defined in Article 15 of Regulation (EU) 2019/947, which could be encompassed within the U-space airspace. \n\nFurthermore, Member States should define the U-space airspace operational conditions and constraints: \n  \n(a) for U-space airspace designated in controlled airspace, the means and procedures to disseminate information regarding dynamic airspace reconfiguration; \n  \n(b) the potential pre-established contingency or emergency procedures; \n  \n(c) the weather limitations, in terms of maxima or minima for important meteorological parameters (e.g. maximum gust, and visibility minimum, temperature minimum); \n  \n(d) the maximum simultaneous UAS operations, and the maximum density of UAS flights allowed within the designated U-space airspace; \n  \n(e) the  minimum  safety  distance  (spacing)  to  be  maintained  between  manned  and  unmanned aircraft in airspace where manned aircraft operations are not subject to air traffic control; \n  \n(f) the residual airspace risk class (ARC) to support the specific operations risk assessment (SORA) as defined in Regulation (EU) 2019/947; \n  \n(g) any other operational conditions and constraints derived from the airspace risk assessment (e.g. mitigation of specific hazards identified during the assessment).",

    "note": "https://www.easa.europa.eu/sites/default/files/dfu/Easy_Access_Rules_for_Standardised_European_Rules_of_the_Air__SERA_.pdf (page 75)\n\nSERA.6005 of Regulation (EU) No 923/2012 - Requirements for communications and SSR transponder\n\n(c) U-space airspace - Manned  aircraft  operating  in  airspace  designated  by  the  competent  authority  as  a  U-space  airspace,  and  not provided  with  an  air  traffic  control  service  by  the  ANSP,  shall  continuously  make  themselves  electronically conspicuous to the U-space service providers.\n\nAMC1 SERA.6005(c)\n\n(a) Manned aircraft should transmit information through one or more of the following means to continuously make themselves electronically conspicuous to U-space service providers:\n\n  (1) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume IV Chapter 5  (Mode-S Extended Squitter).\n  \n  (2) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume III Chapter 12 (Universal Access Transceiver) 12 months after its implementation and deployment for that purpose in all Member States.\n  \n  (3) A system that transmits the information specified in Appendix 1 to this AMC using:\n    \n    (i) a short-range device (SRD) 860 frequency band, and the information is transmitted in compliance with the format as documented in technical specification  ADS-L 4 SRD-860;\n    \n    (ii) standardised mobile telecommunication network services coordinated for aerial use in the relevant decisions of the Electronic Communication Committee (ECC) of the European Conference of Postal and Telecommunications Administrations (CEPT), and the information is transmitted in compliance with the format as documented in technical specification ADS-L 4 MOBILE. The aircraft operator using application-based service should ensure that all other applications or functions that might run in the background are switched off or made inactive to limit in-flight transmissions to only those necessary to minimise interference through unpredictable data upload. This option becomes applicable 6 months after the publication of the technical specification ADS-L 4 MOBILE.\n    \n  The systems used for transmission in accordance with points (3)(i) and (ii) should bear an appropriate CE marking, and be either installed on the aircraft with the installation approved by the competent authority or carried on board the aircraft as non-installed equipment.\n  \n(b) The information specified in Appendix 1 to this AMC, and which is transmitted through a system referred to in points (3)(i) and (ii), shall be transmitted in a machine-readable format accessible to U-space service providers without any restrictions.",
    "quote": "Considering  Annex  I  to  Regulation  (EU)  2021/664,  and  derived  from  the  airspace  risk  assessment, Member States should establish the following: \n\n(a) The U-space services’ performance requirements and operational constraints: \n\n  (1) the ‘geographic proximity’ to UAS operators at which the UAS remote identification has to be acquired and provided to support the network information service;\n\n  (2) the maximum data ‘latency’ and ‘frequency’ at which the traffic information needs to be provided  to  UAS  operators  to  ensure  the  proper  functioning  of  the  traffic  information service; \n\n  (3) the  ‘proximity’  to  the  UAS  position,  and  the  associated  definition  of  the  surveillance volume at/within which the traffic information should be provided to UAS operators;\n\n  (4) the  ‘deviation  thresholds’,  meant  to  be  the  maximum  acceptable  deviation  from  the intended  UAS  flight  path,  to  be  considered  by  the  USSP  when  processing  a  flight authorisation or to generate a non-conformance alert to the UAS operator; \n\n  (5) flight authorisation constraints that may be defined to ensure fair and efficient access to the U-space airspace;\n\n  (6) the data quality requirements for weather data, when relevant; \n  \n  (7) the minimum coverage (e.g. horizontal and vertical range within and, when required, also outside the U-space airspace) for the receipt of information from electronically conspicuous manned  aircraft  that  are  not  subject  to air  traffic  control, considering  the means  of  compliance  as  defined  in  AMC1  to  point  SERA.6005(c)  of  Regulation  (EU) No 923/2012, and complementary information about manned aircraft traffic potentially shared by the relevant air traffic service units. \n\n(b) The required UAS capabilities and performance requirements. \n\nFor  the  determination  of  the  performance  requirements,  the  contribution  of  the  U-space  actors (layers) should be taken into account including, when relevant, the single CIS provider, the USSP, and UAS operators (e.g. reaction time)",

    "note": "Relation with SORA.",
    "quote": "While it is considered that the initial ARC of UAS operations in the ‘specific’ category is established taking  into  account  the  airspace  classification  and  type  of  complexity  of  the  airspace  (e.g.  height, danger area, etc.) for the purpose of a harmonised U-space airspace implementation, it is recommended  to  apply  the  residual  ARC  as  follows  (after  having  applied  all  the  strategical  and pre-tactical and tactical means that support the implementation of the U-space airspace, and having ensured the proper utilisation of the required U-space services): \n\nIt is recommended to apply residual ‘ARC-b’ for U-space in both controlled and uncontrolled airspace (or in airspace where both controlled and uncontrolled manned aircraft may operate simultaneously), relying on the provision of tactical information through the ‘traffic information service’ and the U-space  segregation  principle  (e.g.  dynamic  airspace  reconfiguration)  to  maintain  safe  separation from manned aircraft, while still accounting for a certain level of air risk for manned aircraft. \n\nThe demonstration by UAS operators of the relevant tactical mitigations performance requirements (TMPR) to their competent authority that has provided the operational authorisation is still required. In  the  context  of  U-space,  additional  requirements  complementing  the  defined  SORA/TMPR  in Regulation  (EU)  2019/947  may  be  established  by  the  Member  State  through  the  definition  of  the U-space performance requirements.",

    "quote": "It is expected that the acceptable level of safety may be achieved by having UAS flight authorisation for 4D trajectories that do not intersect and contain their flights for 95 % of the time. \n\nThe  UAS  flight  authorisation  describes  the  flight  trajectory  as  a  series  of  one  or  more  4D  volumes expressed in height (base, ceiling), longitudinal and lateral limits, and duration (entry and exit times). Each dimension includes the uncertainty of the flight, considering the UAS operational performance, and the assumptions on the operator proficiency and weather conditions. \n\nIt is recommended as best practice that these uncertainties be capped in the given probability of 95 %. The resulting deviation  threshold defines an additional 4D volume around each planned 4D volume for a flight. The dimensions may be specified to balance the needs of safety with the efficient use of the airspace, and refine them over time for the U-space airspace under consideration based on the observed usage of the U-space airspace, the performance (and conformance) of the UAS flights in the airspace, and other factors.",

    "note": null,
    "quote": "Proximity  is  understood  as  the  distance  between  two  aircraft.  In  the  context  of  traffic  information service,  its  value  should  be  determined  in  such  a  way  to  allow  UAS  operators  enough  time  to  take appropriate action to avoid collision hazards. Proximity values may vary depending on the geography of the U-space airspace and the type of expected operations (e.g. BVLOS/VLOS), and also on the type and performance of manned aircraft that operate in or cross through the U-space airspace.\n\nThe  constraints  in  terms  of  situational  awareness,  and  thus  the  proximity  values,  may  differ  for manned and unmanned aircraft. Manned aircraft are usually much faster than unmanned aircraft. Due to  their  higher  velocity,  and  due  to  the  fact  that  manned  aircraft  induce  wake  turbulence,  UAS operators  may  need  to  ensure  situational  awareness  at  a  much  wider  scale  to  effectively  assess incoming traffic and take appropriate action to maintain sufficient spacing.\n\nFor instance,  to enable a 10-minute reaction time  for the UAS operator, and considering a manned traffic velocity of 120 kt (≈240 km), a wider volume of 20 NM (≈37 km) and 5 000 ft (≈1 500 m) may be taken as reference to adequately monitor manned traffic patterns.\n\nThese factors are to be considered by Member States to ultimately specify the appropriate ‘surveillance volume’. In addition, considering such constraints, and to safely enable operations close to  the  geographical  borders  of  the  U-space airspace, the ‘surveillance volume’ should  include  the adjacent airspace beyond the strict geographical limit of the U-space airspace.",

    "note": "https://www.easa.europa.eu/sites/default/files/dfu/Easy_Access_Rules_for_Standardised_European_Rules_of_the_Air__SERA_.pdf (page 75)\n\nSERA.6005 of Regulation (EU) No 923/2012 - Requirements for communications and SSR transponder\n\n(c) U-space airspace - Manned  aircraft  operating  in  airspace  designated  by  the  competent  authority  as  a  U-space  airspace,  and  not provided  with  an  air  traffic  control  service  by  the  ANSP,  shall  continuously  make  themselves  electronically conspicuous to the U-space service providers.\n\nAMC1 SERA.6005(c)\n\n(a) Manned aircraft should transmit information through one or more of the following means to continuously make themselves electronically conspicuous to U-space service providers:\n\n  (1) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume IV Chapter 5  (Mode-S Extended Squitter).\n  \n  (2) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume III Chapter 12 (Universal Access Transceiver) 12 months after its implementation and deployment for that purpose in all Member States.\n  \n  (3) A system that transmits the information specified in Appendix 1 to this AMC using:\n    \n    (i) a short-range device (SRD) 860 frequency band, and the information is transmitted in compliance with the format as documented in technical specification  ADS-L 4 SRD-860;\n    \n    (ii) standardised mobile telecommunication network services coordinated for aerial use in the relevant decisions of the Electronic Communication Committee (ECC) of the European Conference of Postal and Telecommunications Administrations (CEPT), and the information is transmitted in compliance with the format as documented in technical specification ADS-L 4 MOBILE. The aircraft operator using application-based service should ensure that all other applications or functions that might run in the background are switched off or made inactive to limit in-flight transmissions to only those necessary to minimise interference through unpredictable data upload. This option becomes applicable 6 months after the publication of the technical specification ADS-L 4 MOBILE.\n    \n  The systems used for transmission in accordance with points (3)(i) and (ii) should bear an appropriate CE marking, and be either installed on the aircraft with the installation approved by the competent authority or carried on board the aircraft as non-installed equipment.\n  \n(b) The information specified in Appendix 1 to this AMC, and which is transmitted through a system referred to in points (3)(i) and (ii), shall be transmitted in a machine-readable format accessible to U-space service providers without any restrictions.",
    "quote": "Traffic information may be complemented by information about manned aircraft traffic shared by the relevant air traffic service units. This may include information from primary and secondary surveillance radars, multilateration surveillance systems and other surveillance or tracking systems already used by air traffic service units.\n\nThe complementary traffic information about manned aircraft traffic should be considered as one of the inputs to the airspace risk assessment referred to in Article 3(1) of Regulation (EU) 2021/664.\n\nThe  complementary  traffic  information  may,  in  exceptional  cases  and  subject  to  deriving  positive results  from  the  airspace  risk  assessment  referred  to  in  Article  3(1)  of  Regulation  (EU)  2021/664, alleviate  the  need  for  the  deployment  of  new  ground  infrastructure  necessary  for  the  continuous receipt  of  information  from  manned  aircraft  that  make  themselves  electronically  conspicuous  in accordance with AMC1 to point SERA.6005(c) of Regulation (EU) No 923/2012. This is to be considered especially  in  situations  where  the  deployment  of  new  ground  infrastructure  could  constitute  a disproportionate burden on USSPs when compared to the existing requirement for manned aircraft that operate in airspace which is being considered for designation as U-space airspace by the Member States.",

    "note": "DAR concept.",
    "quote": "(a) Article  4  introduces  the  concept  of  dynamic  reconfiguration  of  the  U-space  airspace  and requires Member States to ensure that this concept is effectively put in place to avoid proximity between manned and unmanned aircraft within the U-space airspace.\n\n(b) The  dynamic  reconfiguration  of  the  U-space  airspace  is  an  important  element  of  the  overall safety  argument  for  safe  operations  in  the  U-space  airspace.  It  applies  to  a  U-space  airspace that is established in controlled airspace and allows manned aircraft to fly clear of the U-space airspace  whilst  ensuring  the  containment  of  the  U-space  traffic.  Dynamic  reconfiguration  is carried  out  by  the  ATC  unit  in  response  to  variable  manned  traffic  patterns,  which  demand short-term U-space airspace adaptations.\n\n(c) Initially,  at  least,  the  number  of  instances  where  dynamic  airspace  reconfiguration  would  be required should be limited. In addition, certain strategic measures could be taken to limit the extent of the dynamic airspace reconfiguration through, for example, the design of the U-space airspace itself. The better the airspace is designed, the easier it will be for ATC units to segregate manned from unmanned aircraft in the U-space airspace.\n\n(d) Operationally, the ATC unit will inform USSPs that, depending on the U-space airspace design, certain portions of the U-space airspace (or its entirety) are (is) not eligible for flight authorisation,  activation,  and  utilisation  by  the  UAS.  When  these  portions  of  the  U-space airspace are dynamically deactivated, for tactical, short-term changes in manned traffic demand,  USSPs  should  not  grant  flight  authorisation/activation  and  should  request  the  UAS operator that already flies into the deactivated portion of the U-space airspace to either exit it or land.\n\n(e) The  time  margins  (time  within  which,  after  deactivation,  it  is  expected  that  the  UAS  that occupies the relevant portions of the U-space airspace will exit them or will have to land) for these operations may be established on a case-by-case basis, based on different factors, such as  the  proximity  of  the  ATC  route  to  the  U-space  airspace,  including  standard  instrument departure / standard instrument arrival (SID/STAR), typical performance of manned aircraft in that  particular  airspace,  constraints  in  the  controlled  airspace,  or  unexpected  situations  (e.g. non-standard go-around, emergency).\n\n(f) When  the  ATC  unit  intends  to  issue  a  clearance  to  a  manned  aircraft  to  enter  the  U-space airspace,  it  will  initiate  a  dynamic  airspace  reconfiguration  procedure.  The  ATC  unit  will preliminarily alert, through its respective USSPs, UAS operators about the imminent deactivation  of  the  entirety,  or  the  relevant  portions,  of  the  U-space  airspace  to  let  them anticipate and engage the appropriate manoeuvres. The ATC unit will then publish a temporary U-space airspace restriction for UAS as part of the CIS for that U-space airspace. USSPs that are active in that U-space airspace will adhere to this newly published restriction and provide the corresponding  information  to  all  UAS  operators  connected  to  their  services  through  the geo-awareness  service.  In  addition,  they  will  check  authorised  UAS  flights  against  the  newly published restriction and cancel or amend flight authorisations accordingly.\n\n(g) The UAS operators concerned will be notified through the UAS flight authorisation service and will need to either discontinue their flights or conform with the amended UAS flight authorisations, as applicable. USSPs will notify the ATC unit once the restricted portion of the U-space  airspace  is  clear  of  UAS  traffic  as  UAS  will  have  exited  the  restricted  portion  of  the U-space airspace.\n\n(h) The ATC unit will clear manned aircraft to enter the U-space airspace once it is ensured that the segregation from UAS traffic has been achieved.\n\n(i) Upon completion of the manned flight through the U-space airspace, the ATC unit will complete the dynamic airspace reconfiguration procedure, by lifting the dynamic restriction, and USSPs will be allowed again to activate UAS flight authorisations or provide UAS new flight authorisations for UAS operators accordingly.",

    "quote": "(a) The segregation effectiveness and assurance are highly dependent on the amount of time given to UAS operators to react according to the performance of the UAS they operate. As per GM2 to  point  ATS.TR.237  of Regulation (EU) 2017/373 amended by Regulation (EU) 2021/665, the ATC unit is expected to raise an alert as soon as practicable and ensure a recommended time window of 10 minutes before the implementation, plus 2 minutes once the restriction becomes active.\n\n(b) To ensure  that manned aircraft  that operate in controlled airspace  within a U-space  airspace are segregated from UAS that operate in that U-space airspace, there is a need for:\n\n  (1) performance standards for UAS (those for manned aircraft being already widely established) to make reasonably sure that UAS will have the capability to stay within the defined airspace volume, with reference to both position accuracy and horizontal/vertical speed, and to exit the deactivated U-space airspace or land within a reasonable time;\n\n  (2) criteria  (e.g.  applicable  buffer)  to  determine  the  airspace  volume  required  to  consider that segregation has been reasonably assured.\n\n(c) According  to  Article  3(4)(a)  of  Regulation  (EU)  2021/664,  UAS  capabilities  and  performance requirements  are  determined  by  Member  States  for  each  U-space  airspace,  based  on  the related airspace risk assessment.",

    "note": "GM1 Article 5\n\n(a) Article  5  of  Regulation  (EU)  2021/664  defines  the  content  and  organises  the  distribution  of ‘common information’ — that is, the necessary information that needs to be shared between the relevant operational stakeholders for the safe operation of UAS in the U-space airspace.\n\n(b) Common information is a collection of data that originates mainly from three different sources:\n\n  (1) the  Members  States  responsible  for  the  design  of  the  U-space  airspace,  including  its dimensions, performance requirements, and static or dynamic restrictions;\n\n  (2) the ATS providers responsible for the transmission of manned traffic information as laid down  in  point  ATS.OR.127  of  Regulation  (EU)  2017/373  amended  by  Regulation  (EU) 2021/665, and the ATS units when applying the dynamic reconfiguration of the U-space airspace;\n\n  (3) the USSPs, through the terms and conditions as regards access to their services.",

    "note": "GM1 Article 5\n\n(c) Member States may decide to designate a dedicated entity to provide CIS on an exclusive basis in  a  given  U-space airspace. Such ‘single common  information  service  provider’  (single  CIS provider) would make the relevant information available to all relevant operational stakeholders. The single CIS provider would need to be certified for the services it provides. The designation of a single CIS provider would need to be notified to other Member States as well as to the Agency.\n\n(d) In the absence of a single CIS provider, common information is directly exchanged between the relevant operational stakeholders in a distributed communication architecture, whereby each data  provider  communicates  directly  with  another  USSP  for  sharing  information.  Each  USSP needs  to  communicate  with  other  data  providers.  A  clear  allocation  of  common  information elements  between  Member  States,  ATS  providers  and  USSPs  would  allow  data  users  to  find target data quickly and efficiently. In the absence of a single CIS provider, there is no need for additional certification; the  provision of common information elements by ATS providers and USSPs  will  be  covered  by  their  respective  certificate  and  the  provisions  of  Regulation  (EU) 2021/664 and Regulation (EU) 2021/665 amending Regulation (EU) 2017/373.\n\n(e) Members  States  may  decide  to  designate  different  single  CIS  providers  for  different  U-space airspace  volumes,  or  designate  a  single  CIS  provider  for  some  of  their  designated  U-space airspace  volumes  only,  otherwise  opting  for  a  distributed  model  of  exchange  of  common information.\n\n(f) To achieve a high level of data exchange and interoperability between the CIS and State services (law  enforcement  and  potentially  military  authorities),  the  CIS  may  need  to  comply  with  the national security and defence requirements.",

    "note": null,
    "quote": "For the purposes of Regulation (EU) 2021/664:\n\n(a) ‘common information services’ (CIS) refers to the digital environment (network or platform) in which the common information elements (data) that support the implementation and proper functioning of the U-space airspace are provided/exchanged.\n\n(b) ‘providers  of  common  information’ refers to entities/organisations  that  provide  common information elements (data) to the common information services (CIS).\n\n(c) ‘single CIS provider’ refers to a certified organisation that ensures the interface and exchange between the ‘providers  of  common  information’ and the  USSPs.  There is one ‘single  CIS provider’ per U-space airspace. On the principles, the single CIS provider supports the provision of  U-space  services  by  providing  common  information  to  USSPs,  but  does  not  have  active operational  roles  and  responsibilities.  For  instance,  it  should  not  take  part  in  the  flight authorisation, which is the sole responsibility of the USSP.\n\n(d) ‘distributed model’ or ‘decentralised model’ refers to a U-space architecture without a ‘single CIS  provider’ where each ‘provider  of  common  information’ makes  common  information elements (data) directly available to the other operational stakeholders (e.g. USSPs).\n\n(e) ‘centralised model’ refers to a U-space architecture with a ‘single CIS provider’ which collects common information elements (data) from ‘providers of common information’ and makes them available to all operational stakeholders (e.g. USSPs).",

    "performance": false,
    "reviewed": true,
    "note": null,
    "quote": "(a) A U-space service provider (USSP) is a new entity established by this Regulation. It refers to an organisation  that  is  certified  by  a  competent  authority  to  provide  U-space  services  in  the U-space airspace. \n\n(b) USSPs are responsible for implementing and providing the bundle of U-space services required by the Member State that designates the U-space airspace.\n\n(c) Entities that are not willing to deliver all required U-space services may act as subcontractors to a USSP that provides all required U-space services. \n\n(d) A USSP may subcontract the provision of some or all U-space services to other entities if they remain  under  its  management  control.  There  can  also  be  associations  between  USSPs  or equivalent  mechanisms,  if  it  is  clear  that  there  is  a  single  certified  entity  responsible  for providing the required bundle of U-space services to UAS operators. When required, the USSP should ensure that the competent authority is given access to any subcontracted organisation and data relevant to support the USSP certification.\n\n(e) USSPs ensure coordination with CIS providers or, when designated, the single CIS provider.\n\n(f) USSPs ensure operational coordination with other USSPs  that are  active  in the same U-space airspace and the relevant ATSPs. Only some specific information is expected to be sent back to the relevant ATC unit.\n\n(g) USSPs  support  the  dissemination  and  acknowledgment  of  notification  on  dynamic  airspace reconfiguration, in accordance with Article 4 of Regulation (EU) 2021/664.\n\n(h) USSPs support the competent authority in recording and making operational data available to support the conduct of safe operations in the U-space airspace, as laid out in the AMC and GM to Article 18(f) and (h) of Regulation (EU) 2021/664.",
    "references": [

    "quote": "The  USSP  should  ensure  that  the  information  that  may  affect  safety  is  efficiently  conveyed  to  UAS operators,  allowing  them  to  take  the  necessary,  appropriate  actions  to  ensure  safety  in  a  timely manner.\n\nAccordingly, the USSP should:\n\n(a) identify the information that supports safety, and requires immediate UAS operator awareness;\n\n(b) reduce the risk of missing the information that supports safety by deploying means to ensure that the attention of UAS operators will be appropriately attracted.",

    "quote": "The USSP should develop and provide UAS operators with instructions on how to conduct operations within the U-space airspace. The operating instructions should encompass:\n\n(a) the transcription of the operational conditions and airspace constraints that originate from the U-space airspace risk assessment;\n\n(b) a user guide documenting how UAS operators should configure and use USSP services;\n\n(c) when the services are provided through an API, the user guide should also contain the technical instructions and requirements to the UAS operators to ensure the continued satisfaction of the performance requirements and overall safety;\n\n(d) recommendations ensuring the security of the exchange;\n\n(e) the normal, contingency, and emergency procedures related to U-space services, to be applied by UAS operators.",

    "note": null,
    "quote": "Regulation  (EU)  2021/664  assumes  that  the  U-space  is  a  connected  environment.  A  connected environment refers to any digital connection that meets the requirements established by the USSP for the  provision  of  the  U-space  services  in  question.  A  connected  environment  is  not  restricted  to internet-based  connectivity,  although  the  vast  majority  of  connections  between  a  USSP  and  a  UAS operator are expected to be internet based.\n\nTherefore:\n\n(a) U-space  information  is  exchanged  in  a  machine-readable  format  to  support  the  necessary exchange of data among the U-space actors concerned; and\n\n(b) operations in the U-space airspace require the UAS operator to establish a connection to a USSP.",

    "note": "USSP frontend requirement.",
    "quote": "Safety-critical information, which may require the UAS operators’ immediate awareness, may concern the following: \n\n(a) degradation of services; \n\n(b) changes  in  the  configuration  of  the  U-space  airspace  (e.g.  dynamic  airspace  restriction  or reconfiguration); \n\n(c) changes in the flight authorisation; \n\n(d) new emergency in the proximity of the UAS flight; \n\n(e) non-conformance, when relevant for the U-space airspace; \n\n(f) incoming manned traffic which may eventually result in a conflict with the UAS flight trajectory; \n\n(g) infringement of the UAS flight authorisation; \n\n(h) detection  of  rogue  traffic  in  the  proximity  or  within  the  volume  where  the  UAS  flight  is performed.",

    "performance": false,
    "reviewed": true,
    "note": "USSP frontend requirement.",
    "quote": "Safety relies on the timely reaction of UAS operators to situational changes that may dynamically occur in the U-space airspace throughout the UAS flight. Inappropriate UAS operator reaction due to a lack of  sufficient  awareness  may  ultimately  compromise  safety.  Moreover,  UAS  operations  require  UAS operators  to  additionally  manage  operational  information  than  just  strict  UAS  flight  data.  In  some conditions, especially where high workload is involved, UAS operators may have limited capability to focus their attention on monitoring U-space services in order to detect new relevant information.\n\nRegardless  of  being  served  by  the  USSP  through  a  separate  user  interface/application  or  through direct  application  programming  interface  (API),  UAS  operators  need  to  be  clearly  alerted  to  new, safety-critical  information  during  all  phases  of  flight  (flight  preparation,  preflight,  in  flight  and postflight).\n\nTo effectively attract the attention of UAS operators, the USSP may either implement or provide the supporting means of various techniques such as:\n\n(a) visual annunciations (e.g. flashing red),\n\n(b) aural annunciations (e.g. sounds or voice),\n\n(c) telephony voice messages,\n\n(d) telephony text messages, coupled with haptic sense.\n\nTo maximise the effectiveness of the attention-getter, it is recommended that the USSP rely on more than one means for raising awareness on safety-critical information that requires immediate attention.\n\nThe  implementation  of  the  necessary  alerting  means  should  ensure  the  use  of  appropriate  designs that effectively raise the attention of UAS operators while preventing undue nuisance and distraction that could impair the safe conduct of UAS operations.",
    "references": [
      "EASA AMC&GM to 2021/664 | GM3 Article 7(2)"
    ],
    "ids": {
      "USSP": "USSP-083"
    },
    "applies_to": [
      "EU IR 2021/664 | Article 7(2)"
    ]
  },

    "note": "Only for U-space in controlled airspace.",
    "quote": "For U-space airspace established in controlled airspace, the USSP should establish a written agreement with  the  relevant  ATSP  covering  the  coordination  of  activities,  as  well  as  the  exchange  of  relevant operational data and information. The coordination activities between the USSP and the ATSP should cover:\n\n(a) the  emergency management  plan  as  per  Article  15(2)  of  Regulation  (EU)  2021/664,  including contingency and emergency conditions involving manned and unmanned aircraft;\n\n(b) the exchange of relevant operational data and information, if not provided through the CIS, as per point ATS.OR.127 of Regulation (EU) 2017/373 amended by Regulation (EU) 2021/665;\n\n(c) the  dynamic  airspace  reconfiguration  procedure,  laid  down  in  Article  4  of  Regulation  (EU) 2021/664, and in accordance with point ATS.TR.237 of Regulation (EU) 2017/373 amended by Regulation (EU) 2021/665, in identifying the means to:\n\n  (1) receive the dynamic airspace reconfiguration requests from the ATC unit;\n  \n  (2) notify  in  a  timely  manner  the  ATC  unit  about  the  presence  of  UAS  special  operations within the designated U-space airspace as per AMC2 to point ATS.TR.237(a) of Regulation (EU) 2017/373 amended by Regulation (EU) 2021/665;\n  \n  (3) notify the ATC unit once the airspace reconfiguration has been implemented, as per the conditions addressed in the AMC and GM to Article 4 of Regulation (EU) 2021/664;\n  \n  (4) alert the ATC unit in case of unavailability of the link with the USSP;\n  \n  (5) alert  the  ATC  unit  in  case  a  relevant  non-conformance  is  identified  in  the  U-space airspace, when the conformance monitoring service is required, and as per Article 13(2) of Regulation (EU) 2021/664.",
