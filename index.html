    }
  }
]
</script>

<script>
(function () {
  "use strict";
  const DATA = JSON.parse(document.getElementById("requirements-data").textContent);
  const byKey = {};
  DATA.forEach(d => { byKey[d.document + " | " + d.reference] = d; });

  // ---- Theme (light / dark) ----
  const root = document.documentElement;
  const themeBtn = document.getElementById("themeToggle");
  function readTheme() { try { return localStorage.getItem("uspace-theme"); } catch (e) { return null; } }
  function saveTheme(v) { try { localStorage.setItem("uspace-theme", v); } catch (e) {} }
  function applyTheme(mode) {
    const light = mode === "light";
    root.classList.toggle("light", light);
    themeBtn.textContent = light ? "\u2600" : "\u263e";
  }
  applyTheme(readTheme() || "dark");
  themeBtn.onclick = () => {
    const light = !root.classList.contains("light");
    saveTheme(light ? "light" : "dark");
    applyTheme(light ? "light" : "dark");
  };

  const SERVICE_LABELS = {
    "geoawareness": "Geo-awareness",
    "network identification": "Network Identification",
    "traffic information": "Traffic Information",
    "uas flight authorisation": "UAS Flight Authorisation",
    "conformance monitoring": "Conformance Monitoring",
    "weather information": "Weather Information",
    "__none__": "Generic (no service)"
  };
  const IMPORTANCE_ORDER = ["HIGH", "MEDIUM", "LOW", "NONE", "UNSET"];
  const GENERIC = "Generic";
  const PLATFORM_ORDER = ["USSP", "CISP", "DAIM"];
  const GROUP_ORDER = [GENERIC].concat(PLATFORM_ORDER);

  function uniqueSorted(values) { return Array.from(new Set(values)).sort(); }

  const facetDefs = [
    { key: "platform", label: "Platform", values: GROUP_ORDER },
    { key: "performance", label: "Performance", boolean: true, values: ["performance"],
      labeler: () => "\u23f1 Measurable performance" },
    { key: "services", label: "U-space Service", multi: true,
      values: Object.keys(SERVICE_LABELS), labeler: v => SERVICE_LABELS[v] },
    { key: "importance", label: "Importance", values: IMPORTANCE_ORDER },
    { key: "type", label: "Type", values: uniqueSorted(DATA.map(d => d.type)) },
    { key: "document", label: "Source Document", values: uniqueSorted(DATA.map(d => d.document)) },
  ];

  const active = {};
  facetDefs.forEach(f => active[f.key] = new Set());
  let searchTerm = "";

  const facetsEl = document.getElementById("facets");
  facetDefs.forEach(f => {
    const wrap = document.createElement("div");
    wrap.className = "facet";
    const h = document.createElement("h3");
    h.textContent = f.label;
    wrap.appendChild(h);
    const chips = document.createElement("div");
    chips.className = "chips";
    f.values.forEach(v => {
      const chip = document.createElement("span");
      chip.className = "chip" + (f.boolean ? " perf" : "");
      chip.textContent = f.labeler ? f.labeler(v) : v;
      chip.onclick = () => {
        active[f.key].has(v) ? active[f.key].delete(v) : active[f.key].add(v);
        chip.classList.toggle("active");
        render();
      };
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);
    facetsEl.appendChild(wrap);
  });

  document.getElementById("search").addEventListener("input", e => {
    searchTerm = e.target.value.trim().toLowerCase();
    render();
  });

  document.getElementById("reset").onclick = () => {
    Object.values(active).forEach(s => s.clear());
    searchTerm = "";
    document.getElementById("search").value = "";
    document.querySelectorAll(".chip.active").forEach(c => c.classList.remove("active"));
    render();
  };

  function matchesServices(item) {
    const sel = active.services;
    if (sel.size === 0) return true;
    const wantNone = sel.has("__none__");
    const named = Array.from(sel).filter(s => s !== "__none__");
    if (wantNone && item.services.length === 0) return true;
    return named.some(s => item.services.includes(s));
  }

  function matchesPlatform(item) {
    const sel = active.platform;
    if (sel.size === 0) return true;
    const plats = item.platforms || [];
    if (sel.has(GENERIC) && plats.length === 0) return true;
    return plats.some(p => sel.has(p));
  }

  function matches(item) {
    if (!matchesPlatform(item)) return false;
    if (active.importance.size && !active.importance.has(item.importance)) return false;
    if (active.type.size && !active.type.has(item.type)) return false;
    if (active.document.size && !active.document.has(item.document)) return false;
    if (active.performance.size && !item.performance) return false;
    if (!matchesServices(item)) return false;
    if (searchTerm) {
      const ids = Object.values(item.ids || {}).join(" ");
      const hay = (item.quote + " " + (item.note || "") + " " + item.reference + " " + item.document + " " + ids).toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    return true;
  }

  const resultsEl = document.getElementById("results");
  const countEl = document.getElementById("count");

  function badge(cls, text) { return '<span class="badge ' + cls + '">' + escapeHtml(text) + '</span>'; }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
  // Wrap occurrences of the active search term (in already HTML-escaped text) in <mark>.
  function highlight(escaped) {
    if (!searchTerm) return escaped;
    const needle = escapeHtml(searchTerm).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    if (!needle) return escaped;
    return escaped.replace(new RegExp(needle, "gi"), m => '<mark class="hl">' + m + '</mark>');
  }
  // Render a markdown pipe table (header row, separator row, body rows) as HTML.
  function renderTable(rows) {
    const cells = rows.map(r => r.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim()));
    const head = cells[0], body = cells.slice(2);
    return '<table class="qtable"><thead><tr>'
      + head.map(c => '<th>' + highlight(escapeHtml(c)) + '</th>').join("")
      + '</tr></thead><tbody>'
      + body.map(r => '<tr>' + r.map(c => '<td>' + highlight(escapeHtml(c)) + '</td>').join("") + '</tr>').join("")
      + '</tbody></table>';
  }
  // Render the quote as paragraph blocks: blank lines (two or more newlines)
  // separate blocks. Inside a block, a line starting with an enumeration marker
  // ("(a)", "(1)", "(i)"...) begins a new item on its own line, indented by a
  // nesting level derived from its source indentation; other lines are treated
  // as wrapped continuations and joined into the current item. A block of
  // markdown pipe-table rows (a header row, a `---` separator row, then body
  // rows) is rendered as a real HTML table. Returns HTML.
  function formatQuote(s) {
    const markerRe = /^\(([0-9]+|[a-z]|[ivxlcdm]+)\)/i;
    return String(s)
      .replace(/\r\n?/g, "\n")
      .split(/\n{2,}/)
      .map(block => {
        const lines = block.split("\n");
        const rows = lines.filter(l => l.trim().length);
        const isTable = rows.length >= 2 && rows.every(l => l.includes("|")) && /^[\s|:-]+$/.test(rows[1]);
        if (isTable) return renderTable(rows);
        const items = [];
        let cur = null;
        for (const raw of lines) {
          if (!raw.trim()) continue;
          const trimmed = raw.trim();
          const indent = (raw.match(/^[ \t]*/) || [""])[0].length;
          if (!cur || markerRe.test(trimmed)) {
            cur = { level: Math.round(indent / 2), text: trimmed };
            items.push(cur);
          } else {
            cur.text += " " + trimmed;
          }
        }
        return items.map(it => {
          const style = it.level > 0 ? ' style="margin-left:' + (it.level * 1.6) + 'em"' : "";
          return '<div class="qp"' + style + '>' + highlight(escapeHtml(it.text)) + '</div>';
        }).join("");
      })
      .join("");
  }

  function badgesHtml(item) {
    const svc = (item.services || []).map(s => badge("b-svc", SERVICE_LABELS[s] || s)).join("");
    const perf = item.performance ? badge("b-perf", "\u23f1 Performance") : "";
    const unreviewed = (item.reviewed === false)
      ? '<span class="unreviewed" title="not yet reviewed">*</span>' : "";
    const plats = (item.platforms && item.platforms.length)
      ? item.platforms.map(p => badge("b-plat " + p, p)).join("")
      : badge("b-plat Generic", "Generic");
    return plats +
      badge("b-imp " + item.importance, item.importance) +
      badge("b-type", item.type) +
      perf + svc + unreviewed;
  }

  function bodyFieldsHtml(item) {
    const reflinks = item.references && item.references.length
      ? '<div class="field"><div class="label">References</div><div class="reflinks">' +
        item.references.map(r => '<a href="#" data-ref="' + escapeHtml(r) + '">' + escapeHtml(r) + '</a>').join("") +
        '</div></div>'
      : "";
    return '<div class="field"><div class="label">Quote</div><div class="quote">' + formatQuote(item.quote) + '</div></div>' +
      (item.note ? '<div class="field"><div class="label">Note</div><div class="note">' + highlight(escapeHtml(item.note)) + '</div></div>' : "") +
      reflinks;
  }

  function cardHtml(item, groupKey) {
    const rid = (item.ids && item.ids[groupKey]) || "";
    const key = item.document + " | " + item.reference;
    return '' +
      '<div class="card' + (searchTerm ? ' open' : '') + '" id="' + escapeHtml(rid) + '" data-key="' + escapeHtml(key) + '">' +
      '  <div class="card-head">' +
      '    <span class="id-badge">' + escapeHtml(rid) + '</span>' +
      '    <div class="head-main">' +
      '      <div class="ref">' + highlight(escapeHtml(item.document)) + ' - ' + highlight(escapeHtml(item.reference)) + '</div>' +
      '      <div class="badges">' + badgesHtml(item) + '</div>' +
      '    </div>' +
      '  </div>' +
      '  <div class="body">' + bodyFieldsHtml(item) + '</div>' +
      '</div>';
  }

  function detailHtml(item) {
    return '<div class="detail-head">' +
      '<div class="ref">' + highlight(escapeHtml(item.document)) + ' - ' + highlight(escapeHtml(item.reference)) + '</div>' +
      '<div class="badges">' + badgesHtml(item) + '</div>' +
      '</div>' + bodyFieldsHtml(item);
  }

  function render() {
    const shown = DATA.filter(matches);
    countEl.textContent = "Showing " + shown.length + " of " + DATA.length + " requirements";

    if (shown.length === 0) {
      resultsEl.innerHTML = '<div class="empty">No requirements match the current filters.</div>';
      return;
    }

    let html = "";
    GROUP_ORDER.forEach(g => {
      const group = shown.filter(d => (g === GENERIC)
        ? (d.platforms || []).length === 0
        : (d.platforms || []).includes(g));
      if (!group.length) return;
      const title = (g === GENERIC) ? "Generic / No platform" : g;
      html += '<div class="group">' +
        '<div class="group-title"><span class="caret">\u25be</span><span>' + title + ' (' + group.length + ')</span></div>' +
        '<div class="group-body">' + group.map(d => cardHtml(d, g)).join("") + '</div>' +
        '</div>';
    });
    resultsEl.innerHTML = html;

    resultsEl.querySelectorAll(".group-title").forEach(t => {
      t.onclick = () => t.parentElement.classList.toggle("collapsed");
    });
    resultsEl.querySelectorAll(".card-head").forEach(h => {
      h.onclick = () => h.parentElement.classList.toggle("open");
    });
    resultsEl.querySelectorAll(".reflinks a").forEach(a => {
      a.onclick = e => { e.preventDefault(); openRef(a.dataset.ref); };
    });
  }

  // ---- Reference preview modal (drill-down stack) ----
  const modalEl = document.getElementById("refModal");
  const modalContentEl = document.getElementById("modalContent");
  const refStack = [];

  function renderModal() {
    const key = refStack[refStack.length - 1];
    const item = byKey[key];
    modalContentEl.innerHTML = item
      ? detailHtml(item)
      : '<div class="modal-notfound">Referenced requirement <b>' + escapeHtml(key) + '</b> not found in dataset.</div>';
    modalEl.classList.toggle("show-back", refStack.length > 1);
    modalContentEl.scrollTop = 0;
  }
  function openRef(key) {
    if (!key) return;
    refStack.push(key);
    renderModal();
    modalEl.classList.add("open");
  }
  function backRef() {
    refStack.pop();
    if (refStack.length) renderModal();
    else closeModal();
  }
  function closeModal() {
    refStack.length = 0;
    modalEl.classList.remove("open");
  }

  document.getElementById("modalBack").onclick = backRef;
  document.getElementById("modalClose").onclick = closeModal;
  modalEl.onclick = e => { if (e.target === modalEl) closeModal(); };
  modalContentEl.onclick = e => {
    const a = e.target.closest("[data-ref]");
    if (a) { e.preventDefault(); openRef(a.dataset.ref); }
  };
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && modalEl.classList.contains("open")) {
      if (refStack.length > 1) backRef(); else closeModal();
    }
  });

  document.getElementById("expandAll").onclick = () =>
    resultsEl.querySelectorAll(".card").forEach(c => c.classList.add("open"));
  document.getElementById("collapseAll").onclick = () =>
    resultsEl.querySelectorAll(".card").forEach(c => c.classList.remove("open"));

  render();
})();
</script>
</body>
</html>
