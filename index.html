    "note": "https://www.easa.europa.eu/sites/default/files/dfu/Easy_Access_Rules_for_Standardised_European_Rules_of_the_Air__SERA_.pdf (page 75)\n\nSERA.6005 of Regulation (EU) No 923/2012 - Requirements for communications and SSR transponder\n\n(c) U-space airspace - Manned  aircraft  operating  in  airspace  designated  by  the  competent  authority  as  a  U-space  airspace,  and  not provided  with  an  air  traffic  control  service  by  the  ANSP,  shall  continuously  make  themselves  electronically conspicuous to the U-space service providers.\n\nAMC1 SERA.6005(c)\n\n(a) Manned aircraft should transmit information through one or more of the following means to continuously make themselves electronically conspicuous to U-space service providers:\n\n  (1) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume IV Chapter 5  (Mode-S Extended Squitter).\n  \n  (2) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume III Chapter 12 (Universal Access Transceiver) 12 months after its implementation and deployment for that purpose in all Member States.\n  \n  (3) A system that transmits the information specified in Appendix 1 to this AMC using:\n    \n    (i) a short-range device (SRD) 860 frequency band, and the information is transmitted in compliance with the format as documented in technical specification  ADS-L 4 SRD-860;\n    \n    (ii) standardised mobile telecommunication network services coordinated for aerial use in the relevant decisions of the Electronic Communication Committee (ECC) of the European Conference of Postal and Telecommunications Administrations (CEPT), and the information is transmitted in compliance with the format as documented in technical specification ADS-L 4 MOBILE. The aircraft operator using application-based service should ensure that all other applications or functions that might run in the background are switched off or made inactive to limit in-flight transmissions to only those necessary to minimise interference through unpredictable data upload. This option becomes applicable 6 months after the publication of the technical specification ADS-L 4 MOBILE.\n    \n  The systems used for transmission in accordance with points (3)(i) and (ii) should bear an appropriate CE marking, and be either installed on the aircraft with the installation approved by the competent authority or carried on board the aircraft as non-installed equipment.\n  \n(b) The information specified in Appendix 1 to this AMC, and which is transmitted through a system referred to in points (3)(i) and (ii), shall be transmitted in a machine-readable format accessible to U-space service providers without any restrictions.",
    "quote": "A USSP should exchange and consolidate the following information with other USSPs that share the same U-space airspace: \n\n(a) UAS remote identification, through the network information service, to support the continuous consolidation of traffic information. \n\n(b) The  status  of  the  UAS  flight  authorisations  to  ensure  the  continuous  synchronisation  of  the authorisations within the U-space airspace and adequate deconfliction. \n\n(c) Traffic  information,  including  e-conspicuous  manned  aircraft,  as  per  point  SERA.6005(c)  of Regulation (EU) No 923/2012, when duly agreed among the USSPs. \n\n(d) Non-conformance alerts trigged by their UAS operators.\n\n(e) Notification of the degradation of their services. \n\n(f) Contingencies and emergencies of their UAS operators. \n\n(g) Other information as required by the Member State and/or as agreed among the USSPs, which may be necessary to ensure interoperability in the U-space airspace.",

erence through unpredictable data upload. This option becomes applicable 6 months after the publication of the technical specification ADS-L 4 MOBILE.\n    \n  The systems used for transmission in accordance with points (3)(i) and (ii) should bear an appropriate CE marking, and be either installed on the aircraft with the installation approved by the competent authority or carried on board the aircraft as non-installed equipment.\n  \n(b) The information specified in Appendix 1 to this AMC, and which is transmitted through a system referred to in points (3)(i) and (ii), shall be transmitted in a machine-readable format accessible to U-space service providers without any restrictions.",

    "note": "First time where regulation specifically mentions Information Exchange Services - IXS. Is this the same IXS that ED-339 talks about for indirect NRID exchange or not?",
    "quote": "(a) U-space  services  may  be  provided  concurrently  by  multiple  USSPs  in  the  same  airspace.  This requires the exchange of information and coordination among those USSPs, as well as between USSPs and other entities (such as UAS operators, ATSPs and CIS providers). Such exchange of information  is  expected  to  be  based  on  open  protocols  and  formats,  using  public,  IP-based networks as transport layers.\n\n(b) The exchange of information (and its models) should be described in a technology-agnostic way (e.g.  in  the  Unified  Modelling  Language  (UML)). The aim  is  to  document  the  key  aspects  of  a dedicated information exchange service at conceptual level. \n\n  (1) Operational and business context of the service: \n\n  (2) Service description: \n\n  (3) Service performance level and validation aspects.\n\n(c) The information exchange services described in point (b) may be realised in different technical implementation levels enabling an architectural approach based on one concept, allowing for multiple potential solutions.\n\n(d) Consequently, different types of data frames might be in use to carry payload. A standard data encoding  may  be  used  to  provide  the  service  (JSON  or  ASTERIX  on  the  example  of  traffic information).\n\n(e) The data encoding should be mapped to the definition of the service payload. Furthermore, the service  that  provided  the  information  on  this  data  encoding  should  be  mapped  in  relevant technical details as well, e.g. in the service interfaces and operations. EUROCAE ED-269, which establishes a conceptual definition and its implementation in a standard data encoding, may be used as an example.\n\n(g) Protocol: Any information exchange should be based on a common open communication protocol, such as the transmission control protocol (TCP). As a minimum, the requirements documented in the SWIM Technical Infrastructure (TI) Yellow Profile, edition 1.1, published on 5 July 2020, should be met.\n\n(h) Extension of information exchange services\n\n  (1) Information exchange services may be extended by the entities described in point (a).\n  \n  (2) The  extension  of  information exchange  services,  by  changing  their  description  (as described  in  point  (b)(2)),  should  not  jeopardise  their  semantic  interoperability  and standardisation across the Member States.\n  \n  (3) The extension of the payload definition can be usually managed by:\n    (i) adding additional properties/attributes to the features;\n    (ii) adding new features.\n    \n  (4) The extension points for additional properties/attributes could be already foreseen in the payload definition, such as free text or a custom enumeration.\n  \n  (5) If custom features are added by an extension, the association between the default and the additional features should always be managed in the additional feature.\n\n  (6) The description of the extended service should introduce optional elements (interfaces, operations, features, attributes/properties, data types, etc.) only. For instance, if additional information regarding communication infrastructure is provided by an extended flight authorisation service, a new feature called ‘communication infrastructure service availability’ might be introduced. This new feature might  be  associated  with  a  flight  authorisation  feature.  The  association  should  be designed  without  changing  the  flight  authorisation  feature,  to  allow  the  processing  of flight authorisations by services that have no knowledge of the ‘communication infrastructure service availability’.\n  \n  (7) The approach to the service description is laid down in the SWIM Service Description and the EUROCONTROL Specification for SWIM — Information Definition.\n\n(i) Protection of information - The necessary protection level will vary depending on the type of the information exchanged. As a minimum, the requirements documented in the SWIM Technical Infrastructure (TI) Yellow Profile, edition 1.1, published on 5 July 2020, should be met. Additional protection should be put in place where applicable, especially when considering the relevant data privacy regulations (e.g. GDPR).",

    "quote": "The operational records are meant to provide data to support the implementation of Article 18(h) of Regulation (EU) 2021/664, and the dynamic reassessment of the definition of the U-space airspace as defined in the AMC and GM to Articles 3(1) and 18(f) of Regulation (EU) 2021/664. The operational data and events that may be of interest to a competent authority are the following:\n\n(a) dynamic airspace reconfiguration or restrictions;\n\n(b) failure to implement dynamic airspace restriction or reconfiguration;\n\n(c) volume of (e-conspicuous) manned aircraft crossing the U-space airspace;\n\n(d) air proximity situation among UAS, and between UAS and manned aircraft;\n\n(e) emergency declared by UAS operators;\n\n(f) deviation (non-conformance) with the flight authorisation;\n\n(g) over-conformance,  when  the  deviation  threshold  may  be  too  wide  and  airspace  capacity wasted;\n\n(h) detection of rogue UAS, or UAS used for malicious or unlawful purposes. The information may be provided in terms of:\n\n  (i) volume/number of occurrences; and\n  (j) date, time, and location expressed in WGS 84 coordinate.\n  \nIt is recommended that the USSP keep the records for a period of 5 years.",

    "note": "It's network identification service who provides externally the registration number of the UAS operator.",
    "quote": "(a) The  network  identification  service  provides  the  registration  number  of  a  UAS  operator,  the serial number of an unmanned aircraft, and live flight data of the UAS. It enables the sharing of information with any of the authorised users listed in Article 8(4) of Regulation (EU) 2021/664. Authorised users will be made aware of the geographical position, route course and emergency status, flight level, and type of the UAS, among other data elements. Based on the information provided by the UAS operators, USSPs share and consolidate UAS flight data among themselves and can, therefore, support traffic information when needed.\n\n(b) The network identification service complements the original intent of the direct and network remote  identification  systems  referred  to  in  Regulation  (EU)  2019/945.  Whereas  the  remote identification  established  in  Regulation  (EU)  2019/945  supports  the  authorities  in  aspects related  to  security  and  privacy,  the  network  identification  service  also  supports  operational needs  and  the  traceability  of  unmanned  aircraft  during  flight.  The  responsibility  for  the provision  of  the  remote  identification  service  lies  with  different  entities.  Regulation  (EU) 2019/945  lays  down  the  requirements  for  the  design  and  manufacture of  unmanned  aircraft systems whereas Regulation (EU) 2021/664 defines the services provided by USSPs.\n\n(c) Detailed  and  accurate  information  about  the  latency  necessary  for  the  proper  functioning  of the  traffic  information  service  may  be  assessed  and  defined  during  the  U-space  airspace  risk assessment.",

    "quote": "(a) The UAS flight authorisation service provides authorisations to UAS operators for each individual flight based on other notified flight requests that may conflict with other unmanned operations within the same U-space airspace. It is a strategic deconfliction tool. The UAS flight authorisation service is provided to a UAS operator under the condition that it has submitted the UAS flight authorisation request before the flight. The content of this request is detailed in Annex IV to Regulation (EU) 2021/664.\n\n(b) The UAS flight authorisation service should be able to handle flight authorisation requests by UAS  operators  for  single  flights  and  for  a  number  of  repetitive  flights  that  are  conducted consecutively on the same route.\n\n(c) This service covers the flight authorisation provided according to Article 15(1) of Regulation (EU) 2019/947;  however,  it  does  not  cover  operational  authorisations  granted  by  the  competent authority as defined in Article 12 of Regulation (EU) 2019/947. The service informs operators of overlaps with any airspace restrictions provided by the geo-awareness service (Article 9). UAS flight authorisations in 4D volume may be used by the conformance monitoring service.\n\n(d) This service is also a way for UAS operators to announce their intent to start their operations by activating  their  UAS  flight  authorisation.  The  activation  of  a  flight  initiates  the  provision  of tactical  services  (like  traffic  information,  network  and  remote  identification  or  conformance monitoring) when  required.  The  subsequent ending  of  the  flight  stops  the  provision of  these services.\n\n(e) This service is mandatory in U-space airspace designated in any airspace (controlled or not) and applies to UAS operators. This service enforces the prioritisation rules. When there is more than one USSP providing U-space services in a U-space airspace, all USSPs should exchange the UAS flight authorisation requests among themselves as well as state the changes to those requests — i.e. ‘Accepted’, ‘Activated’, ‘Withdrawn’, ‘Ended’.\n\n(f) The  information  required  to  process  a  flight  authorisation  is  provided  by  the  UAS  operators (flight authorisation request), other USSPs (other accepted flight authorisations, traffic information), and the CIS (e.g. temporary restrictions, manned traffic information). The single CIS provider has no coordination role and no other responsibilities than to ensure the provision of a subset of information that supports the flight authorisation process.",

    "quote": "(a) The  UAS  flight  authorisation  service  is  a  conflict  resolution  mechanism  and  authorises  flights that are free of intersection with other flight authorisations.\n\n(b) The UAS flight authorisation request describes the flight trajectory as a series of one or more 4D  volumes  expressed  in  height  (base,  ceiling),  longitudinal  and  lateral  limits,  and  duration (entry  and  exit  times).  Each  dimension  includes  the  uncertainties  of  the  flight,  e.g.  earliest possible entry, latest possible exit.\n\n(c) The detection of conflict is performed considering the planned 4D trajectories of the flights with the deviation thresholds added.\n\n(d) The flight authorisation service ensures that the trajectory does not conflict with a no-fly zone and warns if the flight enters a restricted area.\n\n(e) The UAS flight authorisation service describes a 4D trajectory typically in terms of height, length, width, and duration, and ensures that the trajectory does not conflict with a no-fly zone.\n\n(f) The performance required is primarily driven by considering separation assurance and collision avoidance.",

    "note": "Requirement for USSP on how to handle conflicting flight authorisation requests, in order to avoid systematic advantage to a given USSP or a given UAS operator, and with the notion of priority.",
    "quote": "(a) A new flight authorisation request cannot override a previously approved flight authorisation of the same priority. To reduce the number of cases where two conflicting flight authorisation requests arrive before the approval of either of them has finished, the time required to approve a  flight  authorisation  request  by  means  of  ‘proper  arrangements’  as  per  Article  10(6)  of Regulation  (EU)  2021/664  should  be  as  short  as  practically  possible.  When  two  or  more conflicting flight authorisation requests are received so close in time that their processing has not finished when the other(s) is (are) received, then there should be no systematic advantage to a given USSP or a given UAS operator.\n\nThe result should be one of the following:\n\n  (1) the first flight authorisation request received by any USSP is approved;\n  \n  (2) neither/none flight authorisation request is approved;\n  \n  (3) any flight authorisation request at random is approved.\n  \n(b) It  is  not  possible  to  change  an  already  authorised  flight  so  that it  conflicts  with  another authorised flight of the same priority or higher. Any change causing a conflict will be rejected, and the original, unchanged flight authorisation should remain valid.",

    "note": "CONTINUOUS CHECK OF FLIGHT AUTHORISATIONS IN RELATION TO THE PRESENCE OF MANNED AIRCRAFT\n\nHow often this check should happen? GM1 Article 10(10) propose a similar time between updates of NIS for a given flight, but not hard constraints.",

    "note": "For GM1 Article 8(3), aggregated monthly target for update frequency for NIS data is no more than 3 seconds for 95 % of the time, and in 1 second for 99 % of the time, so we can consider continuous checking to use that as starting point.",
    "quote": "(a) The checks should be performed from the moment the flight is authorised until the flight is no longer active (i.e. when the UAS operator signals the flight is no longer active).\n\n(b) ‘Continuous’ checking is likely to be implemented as periodic checking. For an active UAS flight, the check should deliver relevant information as soon as practically possible, hence the checking should  be  performed  at  intervals  similar  to  the  time  between  the  updates  of  the  network information service for a given flight. For a not-yet-active flight, the checking interval may be longer and at the time limit according to the time horizon published by the Member States for the validity and availability of geo-awareness data.",

    "note": "This req. rules the update or withdrawal of a flight authorisation, in relation to the continous checking.\n\nThe continuous checking start froom when the flight is ACCEPTED until it's ENDED.\n\nIt seems that the UAS Operator can ALWAYS request an update of a flight plan as long as it does not create new conflicts.\n\nEnding flights is not USSP action, but UAS operator action. USSP should warn if the flight is still active after the time limit of the flight authorisation has passed.\n\nUSSP can withdrawn or update while flight is active.\n\n------------------------------\n\nQ: Can USSP update flight plan when it's ACCEPTED but not ACTIVATED?\n\nA: Yes, as per AMC1 Article 10(8). Unclear if the operator must accept this in order to become ACTIVATED again or not. Unclear if the status will change from ACCEPTED to UPDATED or no.\n\nQ: Can USSP update flight plan when it's ACTIVATED but not ENDED?\n\nA: Yes, as per GM2 Article 10(10), point (b). Unclear if the operator must accept this in order to become ACTIVATED again or not. Unclear if the status will change from ACTIVATED to UPDATED or no.\n\n------------------------------\n\nQ: Can UAS operator update flight plan when it's ACCEPTED but not ACTIVATED?\n\nQ: Can UAS operator update flight plan when it's ACTIVATED but not ENDED?\n\nAnswers:\n\nFor point (a) for sure Operator can do it while the flight is active, but not clear if he can do it while the flight is just accepted, not active (it make sense that he could, but the wording \"USSP may provide an updated, active ...\" does not clear the friction).\n\n------------------------------\n\nIn my implementation I plan to use as statuses: DRAFTED, SUBMITTED, ACCEPTED, ACTIVATED, ENDED, WITHDRAWN (cancelled by USSP), AMENDED (cancelled by UAS operator)\n\nAnd handle the update without a complete changing in the status, but rather with an additional flag to indicate that the flight plan has been updated, and the UAS operator should acknowledge the update to continue the flight.",
    "quote": "(a) USSPs  may  provide  an  updated,  active  UAS  flight  authorisation  at  the  request  of  the  UAS operator at any time provided that by doing so no new conflicts are produced. For example, a USSP  may  update  a  UAS  flight  authorisation  at  any  point  in  space  to  assist  in  avoiding manoeuvres (e.g. holding or hovering) without the flight being considered non-conforming.\n\n(b) When a USSP becomes aware that an existing flight authorisation is impacted by a new dynamic airspace restriction/limitation or that an existing flight authorisation is considered to be at risk from manned aircraft traffic due to information shared by the relevant air traffic service units, or  information  incoming  from  a  (non-cooperative)  drone  detection  system,  then  the  USSP should either alert the UAS operator and provide it with an updated UAS flight authorisation to resolve the conflict or withdraw the existing UAS flight authorisation. The USSP should request the UAS operator to acknowledge any change in the UAS flight authorisation.\n\n(c) Ending  an  active  flight  is  a  UAS  operator  action,  and  it  is  not  expected  to  be  automatically performed by the USSP. Ending an active  flight  terminates the  provision of ‘tactical’ services, such as network identification, traffic information, and conformance monitoring services. The USSP should warn a UAS operator if it has not ended the flight and the time limit of the flight authorisation has passed.\n\n(d) The USSP may withdraw a flight authorisation prior to flight activation.",

    "note": "RESPONSIBILITY WITH REGARD TO THE PREVENTION OF MID-AIR COLLISION\n\nU-space concept revolves around \"strategic deconfliction\" achieved through uas flight authorization service, tactically ultimately the responsability to separate unmanned traffic from other traffic is solely on the UAS operator.",

    "note": "https://www.easa.europa.eu/sites/default/files/dfu/Easy_Access_Rules_for_Standardised_European_Rules_of_the_Air__SERA_.pdf (page 75)\n\nSERA.6005 of Regulation (EU) No 923/2012 - Requirements for communications and SSR transponder\n\n(c) U-space airspace - Manned  aircraft  operating  in  airspace  designated  by  the  competent  authority  as  a  U-space  airspace,  and  not provided  with  an  air  traffic  control  service  by  the  ANSP,  shall  continuously  make  themselves  electronically conspicuous to the U-space service providers.\n\nAMC1 SERA.6005(c)\n\n(a) Manned aircraft should transmit information through one or more of the following means to continuously make themselves electronically conspicuous to U-space service providers:\n\n  (1) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume IV Chapter 5  (Mode-S Extended Squitter).\n  \n  (2) A certified ADS-B OUT system compliant with ICAO Annex 10 Volume III Chapter 12 (Universal Access Transceiver) 12 months after its implementation and deployment for that purpose in all Member States.\n  \n  (3) A system that transmits the information specified in Appendix 1 to this AMC using:\n    \n    (i) a short-range device (SRD) 860 frequency band, and the information is transmitted in compliance with the format as documented in technical specification  ADS-L 4 SRD-860;\n    \n    (ii) standardised mobile telecommunication network services coordinated for aerial use in the relevant decisions of the Electronic Communication Committee (ECC) of the European Conference of Postal and Telecommunications Administrations (CEPT), and the information is transmitted in compliance with the format as documented in technical specification ADS-L 4 MOBILE. The aircraft operator using application-based service should ensure that all other applications or functions that might run in the background are switched off or made inactive to limit in-flight transmissions to only those necessary to minimise interference through unpredictable data upload. This option becomes applicable 6 months after the publication of the technical specification ADS-L 4 MOBILE.\n    \n  The systems used for transmission in accordance with points (3)(i) and (ii) should bear an appropriate CE marking, and be either installed on the aircraft with the installation approved by the competent authority or carried on board the aircraft as non-installed equipment.\n  \n(b) The information specified in Appendix 1 to this AMC, and which is transmitted through a system referred to in points (3)(i) and (ii), shall be transmitted in a machine-readable format accessible to U-space service providers without any restrictions.",

    "quote": "The weather information service shall include, as a minimum: \n\n(a) wind  direction  measured  clockwise  through  the  true  north  and  speed  in  metres  per second, including gusts; \n\n(b) the height of the lowest broken or overcast layer in hundreds of feet above ground level; \n\n(c) visibility in metres and kilometres; \n\n(d) temperature and dew point; \n\n(e) indicators of convective activity and precipitation; \n\n(f) the location and time of the observation, or the valid times and locations of the forecast; \n\n(g) appropriate QNH with geographical location of its applicability.",

    "performance": false,
    "reviewed": true,
    "note": null,
    "quote": "(a) The USSP collects the weather information necessary to support UAS operational decisions in a specific U-space airspace and supports the provision of other U-space services, such as the UAS flight authorisation service.\n\n(b) It is recognised that the weather information service  intended for UAS operations is different from  that  provided by today’s meteorological service providers, especially when it comes to UAS  operations  in  the ‘open’ and ‘specific’ category.  UAS may  fly  near  buildings  and  in  areas where  current  aeronautical  meteorological  information  is  not  always  provided.  Therefore, Article 12 of Regulation (EU) 2021/664 specifies the minimum content of weather information to be available for the purpose of UAS operations. It does not exclude the possibility that current aeronautical meteorological service providers may also provide this service.",

    "note": null,
    "quote": "UP-TO-DATE INFORMATION\n\n(a) Upon  receipt  of  updated  weather  information  related  to  current  weather,  the  USSP  should provide it to the UAS operator within maximum 30 seconds.\n\n(b) Upon receipt of an updated weather forecast, the USSP should provide it to the UAS operator within maximum 5 minutes from the time the USSP starts processing the data.\n\n(c) The USSP should inform the end user when the information is not up to date.\n\nRELIABILITY\n\n(d) The  USSP  should  inform  the  end  user  of  the  source  of  the  data  at  the  request  of  the  UAS operator.\n\n(e) The  USSP  should  provide  a  confidence  level  of  the  data  being  provided,  where  available,  or indicate that the confidence level is unknown.",

    "note": null,
    "quote": "UP-TO-DATE INFORMATION\n\n(a) It is the responsibility of the USSP to ensure that the data being consumed or referred to is the last available data set from the trusted source.\n\n(b) The USSP is not responsible for ensuring that the data being exposed by the trusted source is effectively the last available data. This responsibility lies with the trusted source.\n\nRELIABILITY\n\n(c) The reliability of  the  data pertains mostly to the security,  availability, and status reporting to the end user. USSPs should ensure that the UAS operator is presented with accurate information that has not been tampered with, and with information regarding the confidence level of the data where this is available at the source.\n\n(d) When MET data  is provided using the standard MET products (such as METAR or aerodrome local report), the confidence levels are contained within the MET standards that define these products, as specified in ICAO Annex 3 ‘Meteorological Service for International Air Navigation’.",

<script>
(function () {
  "use strict";
  const DATA = JSON.parse(document.getElementById("requirements-data").textContent);
  const byKey = {};
  DATA.forEach(d => { byKey[d.document + " | " + d.reference] = d; });

  // ---- Theme (light / dark) ----
  const root = document.documentElement;
  const themeBtn = document.getElementById("themeToggle");
  function readTheme() { try { return localStorage.getItem("uspace-theme"); } catch (e) { return null; } }
  function saveTheme(v) { try { localStorage.setItem("uspace-theme", v); } catch (e) {} }
  function applyTheme(mode) {
    const light = mode === "light";
    root.classList.toggle("light", light);
    themeBtn.textContent = light ? "\u2600" : "\u263e";
  }
  applyTheme(readTheme() || "dark");
  themeBtn.onclick = () => {
    const light = !root.classList.contains("light");
    saveTheme(light ? "light" : "dark");
    applyTheme(light ? "light" : "dark");
  };

  const SERVICE_LABELS = {
    "geoawareness": "Geo-awareness",
    "network identification": "Network Identification",
    "traffic information": "Traffic Information",
    "uas flight authorisation": "UAS Flight Authorisation",
    "conformance monitoring": "Conformance Monitoring",
    "weather information": "Weather Information",
    "__none__": "Generic (no service)"
  };
  const IMPORTANCE_ORDER = ["HIGH", "MEDIUM", "LOW", "NONE", "UNSET"];
  const GENERIC = "Generic";
  const PLATFORM_ORDER = ["USSP", "CISP", "DAIM"];
  const GROUP_ORDER = [GENERIC].concat(PLATFORM_ORDER);

  function uniqueSorted(values) { return Array.from(new Set(values)).sort(); }

  const facetDefs = [
    { key: "platform", label: "Platform", values: GROUP_ORDER },
    { key: "performance", label: "Performance", boolean: true, values: ["performance"],
      labeler: () => "\u23f1 Measurable performance" },
    { key: "services", label: "U-space Service", multi: true,
      values: Object.keys(SERVICE_LABELS), labeler: v => SERVICE_LABELS[v] },
    { key: "importance", label: "Importance", values: IMPORTANCE_ORDER },
    { key: "type", label: "Type", values: uniqueSorted(DATA.map(d => d.type)) },
    { key: "document", label: "Source Document", values: uniqueSorted(DATA.map(d => d.document)) },
  ];

  const active = {};
  facetDefs.forEach(f => active[f.key] = new Set());
  let searchTerm = "";

  const facetsEl = document.getElementById("facets");
  facetDefs.forEach(f => {
    const wrap = document.createElement("div");
    wrap.className = "facet";
    const h = document.createElement("h3");
    h.textContent = f.label;
    wrap.appendChild(h);
    const chips = document.createElement("div");
    chips.className = "chips";
    f.values.forEach(v => {
      const chip = document.createElement("span");
      chip.className = "chip" + (f.boolean ? " perf" : "");
      chip.textContent = f.labeler ? f.labeler(v) : v;
      chip.onclick = () => {
        active[f.key].has(v) ? active[f.key].delete(v) : active[f.key].add(v);
        chip.classList.toggle("active");
        render();
      };
      chips.appendChild(chip);
    });
    wrap.appendChild(chips);
    facetsEl.appendChild(wrap);
  });

  document.getElementById("search").addEventListener("input", e => {
    searchTerm = e.target.value.trim().toLowerCase();
    render();
  });

  document.getElementById("reset").onclick = () => {
    Object.values(active).forEach(s => s.clear());
    searchTerm = "";
    document.getElementById("search").value = "";
    document.querySelectorAll(".chip.active").forEach(c => c.classList.remove("active"));
    render();
  };

  function matchesServices(item) {
    const sel = active.services;
    if (sel.size === 0) return true;
    const wantNone = sel.has("__none__");
    const named = Array.from(sel).filter(s => s !== "__none__");
    if (wantNone && item.services.length === 0) return true;
    return named.some(s => item.services.includes(s));
  }

  function matchesPlatform(item) {
    const sel = active.platform;
    if (sel.size === 0) return true;
    const plats = item.platforms || [];
    if (sel.has(GENERIC) && plats.length === 0) return true;
    return plats.some(p => sel.has(p));
  }

  function matches(item) {
    if (!matchesPlatform(item)) return false;
    if (active.importance.size && !active.importance.has(item.importance)) return false;
    if (active.type.size && !active.type.has(item.type)) return false;
    if (active.document.size && !active.document.has(item.document)) return false;
    if (active.performance.size && !item.performance) return false;
    if (!matchesServices(item)) return false;
    if (searchTerm) {
      const ids = Object.values(item.ids || {}).join(" ");
      const hay = (item.quote + " " + (item.note || "") + " " + item.reference + " " + item.document + " " + ids).toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    return true;
  }

  const resultsEl = document.getElementById("results");
  const countEl = document.getElementById("count");

  function badge(cls, text) { return '<span class="badge ' + cls + '">' + escapeHtml(text) + '</span>'; }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  }
  // Wrap occurrences of the active search term (in already HTML-escaped text) in <mark>.
  function highlight(escaped) {
    if (!searchTerm) return escaped;
    const needle = escapeHtml(searchTerm).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    if (!needle) return escaped;
    return escaped.replace(new RegExp(needle, "gi"), m => '<mark class="hl">' + m + '</mark>');
  }
  // Render a markdown pipe table (header row, separator row, body rows) as HTML.
  function renderTable(rows) {
    const cells = rows.map(r => r.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim()));
    const head = cells[0], body = cells.slice(2);
    return '<table class="qtable"><thead><tr>'
      + head.map(c => '<th>' + highlight(escapeHtml(c)) + '</th>').join("")
      + '</tr></thead><tbody>'
      + body.map(r => '<tr>' + r.map(c => '<td>' + highlight(escapeHtml(c)) + '</td>').join("") + '</tr>').join("")
      + '</tbody></table>';
  }
  // Render the quote as paragraph blocks: blank lines (two or more newlines)
  // separate blocks. Inside a block, a line starting with an enumeration marker
  // ("(a)", "(1)", "(i)"...) begins a new item on its own line, indented by a
  // nesting level derived from its source indentation; other lines are treated
  // as wrapped continuations and joined into the current item. A block of
  // markdown pipe-table rows (a header row, a `---` separator row, then body
  // rows) is rendered as a real HTML table. Returns HTML.
  function formatQuote(s) {
    const markerRe = /^\(([0-9]+|[a-z]|[ivxlcdm]+)\)/i;
    return String(s)
      .replace(/\r\n?/g, "\n")
      .split(/\n{2,}/)
      .map(block => {
        const lines = block.split("\n");
        const rows = lines.filter(l => l.trim().length);
        const isTable = rows.length >= 2 && rows.every(l => l.includes("|")) && /^[\s|:-]+$/.test(rows[1]);
        if (isTable) return renderTable(rows);
        const items = [];
        let cur = null;
        for (const raw of lines) {
          if (!raw.trim()) continue;
          const trimmed = raw.trim();
          const indent = (raw.match(/^[ \t]*/) || [""])[0].length;
          if (!cur || markerRe.test(trimmed)) {
            cur = { level: Math.round(indent / 2), text: trimmed };
            items.push(cur);
          } else {
            cur.text += " " + trimmed;
          }
        }
        return items.map(it => {
          const style = it.level > 0 ? ' style="margin-left:' + (it.level * 1.6) + 'em"' : "";
          return '<div class="qp"' + style + '>' + highlight(escapeHtml(it.text)) + '</div>';
        }).join("");
      })
      .join("");
  }

  function badgesHtml(item) {
    const svc = (item.services || []).map(s => badge("b-svc", SERVICE_LABELS[s] || s)).join("");
    const perf = item.performance ? badge("b-perf", "\u23f1 Performance") : "";
    const unreviewed = (item.reviewed === false)
      ? '<span class="unreviewed" title="not yet reviewed">*</span>' : "";
    const plats = (item.platforms && item.platforms.length)
      ? item.platforms.map(p => badge("b-plat " + p, p)).join("")
      : badge("b-plat Generic", "Generic");
    return plats +
      badge("b-imp " + item.importance, item.importance) +
      badge("b-type", item.type) +
      perf + svc + unreviewed;
  }

  function bodyFieldsHtml(item) {
    const applies = item.applies_to && item.applies_to.length
      ? '<div class="field"><div class="label">Applies to</div><div class="reflinks appliesto">' +
        item.applies_to.map(r => '<a href="#" data-ref="' + escapeHtml(r) + '">' + escapeHtml(r) + '</a>').join("") +
        '</div></div>'
      : "";
    const reflinks = item.references && item.references.length
      ? '<div class="field"><div class="label">References</div><div class="reflinks">' +
        item.references.map(r => '<a href="#" data-ref="' + escapeHtml(r) + '">' + escapeHtml(r) + '</a>').join("") +
        '</div></div>'
      : "";
    return '<div class="field"><div class="label">Quote</div><div class="quote">' + formatQuote(item.quote) + '</div></div>' +
      (item.note ? '<div class="field"><div class="label">Note</div><div class="note">' + formatQuote(item.note) + '</div></div>' : "") +
      applies +
      reflinks;
  }

  function cardHtml(item, groupKey) {
    const rid = (item.ids && item.ids[groupKey]) || "";
    const key = item.document + " | " + item.reference;
    return '' +
      '<div class="card' + (searchTerm ? ' open' : '') + '" id="' + escapeHtml(rid) + '" data-key="' + escapeHtml(key) + '">' +
      '  <div class="card-head">' +
      '    <span class="id-badge">' + escapeHtml(rid) + '</span>' +
      '    <div class="head-main">' +
      '      <div class="ref">' + highlight(escapeHtml(item.document)) + ' - ' + highlight(escapeHtml(item.reference)) + '</div>' +
      '      <div class="badges">' + badgesHtml(item) + '</div>' +
      '    </div>' +
      '  </div>' +
      '  <div class="body">' + bodyFieldsHtml(item) + '</div>' +
      '</div>';
  }

  function detailHtml(item) {
    return '<div class="detail-head">' +
      '<div class="ref">' + highlight(escapeHtml(item.document)) + ' - ' + highlight(escapeHtml(item.reference)) + '</div>' +
      '<div class="badges">' + badgesHtml(item) + '</div>' +
      '</div>' + bodyFieldsHtml(item);
  }

  function render() {
    const shown = DATA.filter(matches);
    countEl.textContent = "Showing " + shown.length + " of " + DATA.length + " requirements";

    if (shown.length === 0) {
      resultsEl.innerHTML = '<div class="empty">No requirements match the current filters.</div>';
      return;
    }

    let html = "";
    GROUP_ORDER.forEach(g => {
      const group = shown.filter(d => (g === GENERIC)
        ? (d.platforms || []).length === 0
        : (d.platforms || []).includes(g));
      if (!group.length) return;
      const title = (g === GENERIC) ? "Generic / No platform" : g;
      html += '<div class="group">' +
        '<div class="group-title"><span class="caret">\u25be</span><span>' + title + ' (' + group.length + ')</span></div>' +
        '<div class="group-body">' + group.map(d => cardHtml(d, g)).join("") + '</div>' +
        '</div>';
    });
    resultsEl.innerHTML = html;

    resultsEl.querySelectorAll(".group-title").forEach(t => {
      t.onclick = () => t.parentElement.classList.toggle("collapsed");
    });
    resultsEl.querySelectorAll(".card-head").forEach(h => {
      h.onclick = () => h.parentElement.classList.toggle("open");
    });
    resultsEl.querySelectorAll(".reflinks a").forEach(a => {
      a.onclick = e => { e.preventDefault(); openRef(a.dataset.ref); };
    });
  }

  // ---- Reference preview modal (drill-down stack) ----
  const modalEl = document.getElementById("refModal");
  const modalContentEl = document.getElementById("modalContent");
  const refStack = [];

  function renderModal() {
    const key = refStack[refStack.length - 1];
    const item = byKey[key];
    modalContentEl.innerHTML = item
      ? detailHtml(item)
      : '<div class="modal-notfound">Referenced requirement <b>' + escapeHtml(key) + '</b> not found in dataset.</div>';
    modalEl.classList.toggle("show-back", refStack.length > 1);
    modalContentEl.scrollTop = 0;
  }
  function openRef(key) {
    if (!key) return;
    refStack.push(key);
    renderModal();
    modalEl.classList.add("open");
  }
  function backRef() {
    refStack.pop();
    if (refStack.length) renderModal();
    else closeModal();
  }
  function closeModal() {
    refStack.length = 0;
    modalEl.classList.remove("open");
  }

  document.getElementById("modalBack").onclick = backRef;
  document.getElementById("modalClose").onclick = closeModal;
  modalEl.onclick = e => { if (e.target === modalEl) closeModal(); };
  modalContentEl.onclick = e => {
    const a = e.target.closest("[data-ref]");
    if (a) { e.preventDefault(); openRef(a.dataset.ref); }
  };
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && modalEl.classList.contains("open")) {
      if (refStack.length > 1) backRef(); else closeModal();
    }
  });

  document.getElementById("expandAll").onclick = () =>
    resultsEl.querySelectorAll(".card").forEach(c => c.classList.add("open"));
  document.getElementById("collapseAll").onclick = () =>
    resultsEl.querySelectorAll(".card").forEach(c => c.classList.remove("open"));

  render();
})();
</script>
</body>
